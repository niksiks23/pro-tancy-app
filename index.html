<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>РИТМ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #9d4edd;
            --primary-dark: #7b2cbf;
            --secondary: #00bbf9;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 10, 30, 0.7);
            --glass-border: rgba(157, 78, 221, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --cancel-color: #ff4b4b;
            --admin-badge: #ff006e;
            --success: #00bbf9;
            --goal-1: #9d4edd;
            --goal-2: #00bbf9;
            --goal-3: #ff9f1c;
            --celebration: #ffd700;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1025 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .app-header {
            padding: 18px 20px 10px;
            text-align: center;
            background: linear-gradient(180deg, rgba(26, 16, 37, 0.95) 0%, rgba(26, 16, 37, 0.8) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            position: relative;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .app-header h1:active {
            transform: scale(0.95);
            background: rgba(157, 78, 221, 0.2);
            -webkit-background-clip: text;
        }

        .app-header p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .admin-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: var(--admin-badge);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-badge.active {
            opacity: 1;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 12px;
            background: rgba(26, 16, 37, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            gap: 5px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 20px;
            flex: 1;
            max-width: 80px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            transition: all 0.2s ease;
        }

        .nav-item.active svg {
            color: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .clip-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: transform 0.15s ease;
        }

        .clip-card:active {
            transform: scale(0.97);
        }

        .clip-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(0, 187, 249, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clip-thumbnail svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
            opacity: 0.8;
        }

        .clip-info {
            padding: 12px;
        }

        .clip-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip-description {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip-stats {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 18px;
        }

        .modal-content {
            width: 100%;
            max-width: 360px;
            max-height: 80vh;
            background: #1a1025;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
        }

        .goal-modal-content {
            width: 100%;
            max-width: 340px;
            background: #1a1025;
            border-radius: 32px;
            padding: 28px 24px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.4);
            position: relative;
            overflow: hidden;
        }

        .goal-modal-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(157,78,221,0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .goal-modal-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .goal-input {
            width: 100%;
            padding: 18px 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            color: white;
            font-size: 16px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .goal-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(157, 78, 221, 0.1);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.3);
        }

        .goal-input::placeholder {
            color: var(--text-muted);
            font-size: 14px;
        }

        .goal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .goal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .goal-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .goal-btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.4);
        }

        .goal-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .goal-btn-secondary:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-placeholder svg {
            width: 48px;
            height: 48px;
            color: white;
        }

        .reactions-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 18px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 40px;
        }

        .reaction-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .reaction-btn:active {
            transform: scale(0.9);
        }

        .reaction-icon {
            width: 52px;
            height: 52px;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .reaction-btn.liked .reaction-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .reaction-btn.disliked .reaction-icon {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .reaction-icon svg {
            width: 26px;
            height: 26px;
            color: white;
        }

        .reaction-count {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }

        .reaction-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .comments-section {
            max-height: 140px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            margin: 16px 0;
        }

        .comment {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .comment:last-child {
            border-bottom: none;
        }

        .comment-author {
            color: var(--primary);
            font-weight: 600;
            margin-right: 6px;
        }

        .calendar-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            border: 1px solid var(--glass-border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .calendar-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .calendar-nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .calendar-nav-btn:active {
            background: var(--primary);
        }

        .calendar-nav-btn svg {
            width: 20px;
            height: 20px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            text-align: center;
        }

        .weekday {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            position: relative;
        }

        .calendar-day:active {
            background: rgba(157, 78, 221, 0.3);
        }

        .calendar-day.has-training {
            background: rgba(157, 78, 221, 0.2);
            color: var(--primary);
            font-weight: 600;
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .calendar-day.other-month {
            opacity: 0.2;
        }

        .training-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--primary);
            color: white;
            font-size: 9px;
            width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .trainings-container {
            margin-top: 14px;
        }

        .trainings-title {
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trainings-title span {
            background: rgba(157, 78, 221, 0.2);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            color: var(--primary);
        }

        .admin-mode-banner {
            background: rgba(255, 75, 75, 0.1);
            border: 1px dashed var(--cancel-color);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--cancel-color);
            font-size: 13px;
            font-weight: 500;
        }

        .admin-mode-banner svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .training-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .training-item.admin-mode {
            cursor: pointer;
            border-left-color: var(--cancel-color);
            background: rgba(255, 75, 75, 0.05);
        }

        .training-item.admin-mode:active {
            background: rgba(255, 75, 75, 0.2);
            transform: scale(0.98);
        }

        .training-item.cancelled {
            opacity: 0.5;
            border-left-color: var(--cancel-color);
            text-decoration: line-through;
        }

        .training-time {
            background: rgba(157, 78, 221, 0.2);
            padding: 5px 10px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .training-name {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .training-cancel-btn {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: var(--cancel-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255, 75, 75, 0.4);
        }

        .no-trainings {
            padding: 24px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* === НОВЫЙ ДИЗАЙН ДЛЯ ЗАНЯТИЙ === */
        .directions-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .direction-card {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .direction-card:active {
            transform: scale(0.98);
        }

        .direction-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px;
            background: linear-gradient(90deg, rgba(157, 78, 221, 0.1), transparent);
            cursor: pointer;
        }

        .direction-icon {
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .direction-title {
            flex: 1;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }

        .direction-arrow {
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .direction-arrow.open {
            transform: rotate(180deg);
        }

        .direction-subitems {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            background: rgba(0, 0, 0, 0.2);
        }

        .direction-subitems.open {
            max-height: 1000px;
        }

        .subitem {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .subitem:active {
            background: rgba(157, 78, 221, 0.2);
        }

        .subitem:last-child {
            border-bottom: none;
        }

        .subitem-photo {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
        }

        .subitem-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .subitem-info {
            flex: 1;
        }

        .subitem-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .subitem-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--success);
            background: rgba(0, 187, 249, 0.1);
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
        }

        /* === СТИЛИ ДЛЯ ПРОФИЛЯ === */
        .profile-header {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 600;
            color: white;
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .profile-id {
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .profile-id svg {
            width: 14px;
            height: 14px;
        }

        .goals-section {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
        }

        .goals-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .goals-title svg {
            color: var(--primary);
        }

        .goal-item {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .goal-item:active {
            transform: scale(0.98);
            background: rgba(157, 78, 221, 0.1);
        }

        .goal-item.completed {
            border-left-color: var(--celebration);
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--celebration); }
            50% { box-shadow: 0 0 20px var(--celebration); }
            100% { box-shadow: 0 0 5px var(--celebration); }
        }

        .goal-item:nth-child(1) {
            border-left-color: var(--goal-1);
        }
        .goal-item:nth-child(2) {
            border-left-color: var(--goal-2);
        }
        .goal-item:nth-child(3) {
            border-left-color: var(--goal-3);
        }

        .goal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .goal-text {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .goal-delete {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: rgba(255, 75, 75, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cancel-color);
            cursor: pointer;
        }

        .goal-delete:active {
            background: rgba(255, 75, 75, 0.3);
        }

        .goal-progress {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .goal-progress-bar {
            flex: 1;

        const defaultData = {
            clips: [],

            profile: {

        function loadData() {
            try {
                const savedClips = localStorage.getItem(STORAGE_KEYS.CLIPS);
                const savedCancelled = localStorage.getItem(STORAGE_KEYS.CANCELLED_TRAININGS);
                const savedRules = localStorage.getItem(STORAGE_KEYS.RULES);
                const savedProfile = localStorage.getItem(STORAGE_KEYS.PROFILE);

                return {
                    clips: savedClips ? JSON.parse(savedClips) : defaultData.clips,
                    cancelledTrainings: savedCancelled ? JSON.parse(savedCancelled) : defaultData.cancelledTrainings,
                    rules: savedRules || defaultData.rules,
                    profile: savedProfile ? JSON.parse(savedProfile) : defaultData.profile
                };
            } catch (e) {
                console.error('Ошибка загрузки данных:', e);
                return defaultData;
            }
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEYS.CLIPS, JSON.stringify(appData.clips));
                localStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings));
                localStorage.setItem(STORAGE_KEYS.RULES, appData.rules);
                localStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(appData.profile));
            } catch (e) {
                console.error('Ошибка сохранения данных:', e);
                showToast('Ошибка сохранения данных');
            }
        }

        let appData = loadData();

        let currentPage = 'schedule';
        let selectedDate = new Date().toISOString().split('T')[0];
        let currentMonth = new Date();
        let isAdmin = false;
        let tgUser = 'Танцор';

        // ПОЛУЧАЕМ ИМЯ ИЗ TELEGRAM (без prompt)

            if (window.Telegram && Telegram.WebApp) {

                const user = Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    tgUser = user.first_name || user.username || 'Танцор';
                }
            }
        } catch (e) {
            console.log('Не удалось получить имя из Telegram');
        }

        // НАПРАВЛЕНИЯ ТОЛЬКО ИЗ РАСПИСАНИЯ (как раньше)
        const danceDirections = [
            {
                id: 1,
                name: 'Бальные танцы',
                icon: '💃',
                open: false,
                subitems: [

                    { name: 'Бальные танцы (7-9 лет)', price: '3800 ₽/мес', photo: 'https://images.unsplash.com/photo-1547153760-18fc86324498?w=400' },
                    { name: 'Бальные танцы (9-12 лет)', price: '4200 ₽/мес', photo: 'https://images.unsplash.com/photo-1504609773096-104ff2c73ba4?w=400' }

            },
            {
                id: 2,
                name: 'Латина',
                icon: '🔥',

                subitems: [
                    { name: 'Латина (новички)', price: '3600 ₽/мес', photo: 'https://images.unsplash.com/photo-1518834107812-5b0325b95ec5?w=400' },

                subitems: [

                ]
            },

                ]
            },

                ]
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            renderPage();
            initAdminTrigger();
            updateAdminBadge();
        });

        function initAdminTrigger() {
            const trigger = document.getElementById('adminTrigger');
            trigger.addEventListener('click', () => {
                if (!isAdmin) {
                    document.getElementById('adminLoginModal').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                    document.getElementById('adminPassword').value = '';
                    document.getElementById('adminPassword').focus();
                } else {
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }
            });
        }

        function updateAdminBadge() {
            const badge = document.getElementById('adminBadge');
            if (isAdmin) {
                badge.classList.add('active');
            } else {
                badge.classList.remove('active');
            }
        }

        window.closeAdminLogin = function() {
            document.getElementById('adminLoginModal').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.checkAdminPassword = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isAdmin = true;
                closeAdminLogin();
                updateAdminBadge();
                
                document.getElementById('rulesText').value = appData.rules;
                
                renderPage();
                
                setTimeout(() => {
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }, 300);
                
                showToast('Режим администратора активирован');
            } else {
                showToast('Неверный пароль');

            isAdmin = false;
            updateAdminBadge();
            closeAdminPanel();
            renderPage();
            showToast('Вы вышли из режима администратора');

            item.addEventListener('click', (e) => {
                e.preventDefault();

                currentPage = item.dataset.page;
                renderPage();
            });

            const content = document.getElementById('content');
            if (!content) return;
            
            switch(currentPage) {
                case 'schedule': renderSchedule(content); break;

                case 'classes': renderClasses(content); break;
                case 'profile': renderProfile(content); break;
            }

            if (appData.clips.length === 0) {
                container.innerHTML = `

                                <span>👎 ${clip.dislikes || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function getTrainingsForDate(dateStr) {
            const date = new Date(dateStr);
            const dayOfWeek = date.getDay() === 0 ? 7 : date.getDay();
            
            const weeklyTrainings = WEEKLY_SCHEDULE[dayOfWeek] || [];
            
            const cancelledForDate = appData.cancelledTrainings[dateStr] || [];
            
            return weeklyTrainings.map(training => {
                const trainingKey = `${training.time} ${training.name}`;
                return {
                    ...training,
                    isCancelled: cancelledForDate.includes(trainingKey)
                };
            });
        }

        function renderSchedule(container) {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            const weekdays = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            
            let html = `
                <div class="calendar-wrapper">
                    <div class="calendar-header">
                        <button class="calendar-nav-btn" onclick="changeMonth(-1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6" /></svg>
                        </button>
                        <h3>${months[month]} ${year}</h3>
                        <button class="calendar-nav-btn" onclick="changeMonth(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6" /></svg>
                        </button>
                    </div>
                    <div class="weekdays">${weekdays.map(d => `<div class="weekday">${d}</div>`).join('')}</div>
                    <div class="calendar-grid">
            `;
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendar-day other-month"></div>';
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const trainings = getTrainingsForDate(dateStr);
                const activeTrainings = trainings.filter(t => !t.isCancelled);
                const hasTraining = activeTrainings.length > 0;
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">
                        ${i}
                        ${activeTrainings.length > 0 ? `<span class="training-count">${activeTrainings.length}</span>` : ''}
                    </div>
                `;
            }
            
            html += '</div></div>';
            
            if (isAdmin) {
                html += `
                    <div class="admin-mode-banner">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                        <span>Режим администратора: нажмите на тренировку чтобы отменить или восстановить</span>
                    </div>
                `;
            }
            
            html += '<div class="trainings-container">';
            html += `<div class="trainings-title">📅 Тренировки <span>${formatDate(selectedDate)}</span></div>`;
            
            const trainings = getTrainingsForDate(selectedDate);
            
            if (trainings.length > 0) {
                trainings.forEach(t => {
                    const isCancelled = t.isCancelled;
                    const cancelledClass = isCancelled ? 'cancelled' : '';
                    const adminClass = isAdmin ? 'admin-mode' : '';
                    
                    html += `
                        <div class="training-item ${adminClass} ${cancelledClass}" 
                             onclick="${isAdmin ? `toggleCancelTraining('${selectedDate}', '${t.time}', '${t.name.replace(/'/g, "\\'")}')` : ''}">
                            <span class="training-time">${t.time}</span>
                            <span class="training-name">${t.name}</span>
                            ${isAdmin ? '<span class="training-cancel-btn">✕</span>' : ''}
                        </div>
                    `;
                });
            } else {
                html += '<div class="no-trainings">Нет тренировок</div>';
            }
            html += '</div>';
            
            container.innerHTML = html;
        }

        function renderClasses(container) {
            let html = '<div class="directions-grid">';
            
            danceDirections.forEach((dir, index) => {
                const isOpen = dir.open ? 'open' : '';
                html += `
                    <div class="direction-card">
                        <div class="direction-header" onclick="toggleDirection(${index})">
                            <div class="direction-icon">${dir.icon}</div>
                            <div class="direction-title">${dir.name}</div>
                            <div class="direction-arrow ${isOpen}">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                    <polyline points="6 9 12 15 18 9" />
                                </svg>
                            </div>
                        </div>
                        <div class="direction-subitems ${isOpen}">
                            ${dir.subitems.map(sub => `
                                <div class="subitem" onclick="openSubitemModal('${sub.name}', '${sub.price}', '${sub.photo}')">
                                    <div class="subitem-photo">
                                        <img src="${sub.photo}" alt="${sub.name}" loading="lazy">
                                    </div>
                                    <div class="subitem-info">
                                        <div class="subitem-name">${sub.name}</div>
                                        <div class="subitem-price">${sub.price}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        window.openSubitemModal = function(name, price, photo) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="video-placeholder">
                        <img src="${photo}" alt="${name}">
                    </div>
                    <h3 style="font-size: 22px; margin-bottom: 10px; color: var(--primary);">${name}</h3>
                    <div style="background: rgba(0,187,249,0.1); padding: 16px; border-radius: 16px; margin: 16px 0;">
                        <div style="font-size: 28px; font-weight: 700; color: var(--success); text-align: center;">${price}</div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="admin-btn secondary" onclick="closeModal()" style="flex: 1;">Закрыть</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        };

        function renderProfile(container) {
            let goalsHtml = '';
            
            if (appData.profile.goals && appData.profile.goals.length > 0) {
                appData.profile.goals.forEach((goal, index) => {
                    const completedClass = goal.progress === 100 ? 'completed' : '';
                    goalsHtml += `
                        <div class="goal-item ${completedClass}" onclick="editGoalProgress(${index})">
                            <div class="goal-header">
                                <div class="goal-text">${goal.text}</div>
                                <div class="goal-delete" onclick="event.stopPropagation(); deleteGoal(${index})">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor">
                                        <line x1="18" y1="6" x2="6" y2="18"></line>
                                        <line x1="6" y1="6" x2="18" y2="18"></line>
                                    </svg>
                                </div>
                            </div>
                            <div class="goal-progress">
                                <div class="goal-progress-bar">
                                    <div class="goal-progress-fill" style="width: ${goal.progress}%;"></div>
                                </div>
                                <div class="goal-percent">${goal.progress}%</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                goalsHtml = `
                    <div style="text-align: center; padding: 30px 20px; color: var(--text-muted);">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="margin-bottom: 12px;">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="16"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                        </svg>
                        <p>Нет целей. Добавьте первую!</p>
                    </div>
                `;
            }
            
            container.innerHTML = `
                <div class="profile-header">
                    <div class="profile-avatar">${tgUser.charAt(0).toUpperCase()}</div>
                    <div class="profile-info">
                        <div class="profile-name">${tgUser}</div>
                        <div class="profile-id">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                            Участник клуба
                        </div>
                    </div>
                </div>
                
                <div class="goals-section">
                    <div class="goals-title">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2v4M12 22v-4M4 12H2M22 12h-2M19.07 4.93l-2.83 2.83M4.93 19.07l2.83-2.83M19.07 19.07l-2.83-2.83M4.93 4.93l2.83 2.83"/>
                            <circle cx="12" cy="12" r="4"/>
                        </svg>
                        Мои цели
                    </div>
                    ${goalsHtml}
                    <div class="add-goal-btn" onclick="openAddGoalModal()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                        Добавить цель
                    </div>
                </div>
                
                <div class="soon-banner">
                    <div class="soon-icon">⚖️</div>
                    <div class="soon-text">
                        <div class="soon-title">Трекер веса</div>
                        <div class="soon-desc">Скоро вы сможете отслеживать динамику веса и многое другое</div>
                    </div>
                </div>
            `;
        }

        // НОВЫЙ КРАСИВЫЙ МОДАЛЬНЫЙ ОКОН ДЛЯ ДОБАВЛЕНИЯ ЦЕЛИ
        window.openAddGoalModal = function() {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'addGoalModal';
            modal.innerHTML = `
                <div class="goal-modal-content">
                    <div class="goal-modal-title">Новая цель</div>
                    <input type="text" class="goal-input" id="goalTextInput" placeholder="Например: Похудеть на 5 кг" autofocus>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveGoal()">Добавить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => {
                document.getElementById('goalTextInput').focus();
            }, 100);
        };

        window.saveGoal = function() {
            const input = document.getElementById('goalTextInput');
            if (input && input.value.trim()) {
                if (!appData.profile.goals) {
                    appData.profile.goals = [];
                }
                appData.profile.goals.push({ 
                    text: input.value.trim(), 
                    progress: 0 
                });
                saveData();
                closeModal();
                renderPage();
                showToast('Цель добавлена!');
            } else {
                showToast('Введите описание цели');
            }
        };

        window.editGoalProgress = function(index) {
            const goal = appData.profile.goals[index];
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'editGoalModal';
            modal.innerHTML = `
                <div class="goal-modal-content">
                    <div class="goal-modal-title">📈 Прогресс</div>
                    <div style="text-align: center; margin-bottom: 16px; color: var(--text-secondary); font-size: 14px;">${goal.text}</div>
                    <input type="number" class="goal-input" id="goalProgressInput" value="${goal.progress}" min="0" max="100" placeholder="0-100">
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="updateGoalProgress(${index})">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => {
                document.getElementById('goalProgressInput').focus();
            }, 100);
        };

        window.updateGoalProgress = function(index) {
            const input = document.getElementById('goalProgressInput');
            if (input) {
                const progress = parseInt(input.value);
                if (!isNaN(progress) && progress >= 0 && progress <= 100) {
                    const goal = appData.profile.goals[index];
                    const wasNot100 = goal.progress !== 100;
                    goal.progress = progress;
                    
                    if (progress === 100 && wasNot100) {
                        celebrateGoal(goal.text);
                    }
                    
                    saveData();
                    closeModal();
                    renderPage();
                } else {
                    showToast('Введите число от 0 до 100');
                }
            }
        };

        window.toggleDirection = function(index) {
            danceDirections[index].open = !danceDirections[index].open;
            renderPage();
        };

        window.celebrateGoal = function(goalText) {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.width = Math.random() * 10 + 5 + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
            
            const celebration = document.createElement('div');
            celebration.className = 'celebration-modal';
            celebration.innerHTML = `
                <h2>🎉 ПОЗДРАВЛЯЕМ! 🎉</h2>
                <p>Вы выполнили цель:</p>
                <p><strong>"${goalText}"</strong></p>
                <p style="margin-top: 20px;">🌟 Вы супер! 🌟</p>
            `;
            document.body.appendChild(celebration);
            
            setTimeout(() => {
                celebration.remove();
            }, 4000);
            
            showToast('🎯 Цель достигнута! Поздравляем!');
        };

        window.deleteGoal = function(index) {
            if (confirm('Удалить цель?')) {
                appData.profile.goals.splice(index, 1);
                saveData();
                renderPage();
                showToast('Цель удалена');
            }
        };

        window.openClip = function(clipId) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (!clip) return;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'clipModal';
            
            const likeClass = clip.userReaction === 'like' ? 'liked' : '';
            const dislikeClass = clip.userReaction === 'dislike' ? 'disliked' : '';
            
            let commentsHtml = '';
            if (clip.comments) {
                clip.comments.forEach(c => {
                    const [author, text] = c.split(': ');
                    commentsHtml += `<div class="comment"><span class="comment-author">${author}</span>${text}</div>`;
                });
            }
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="video-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="white"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="white"/></svg></div>
                    <h3 style="font-size:18px; margin-bottom:6px;">${clip.title}</h3>
                    <p style="font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:12px;">${clip.description}</p>
                    
                    <div class="reactions-container">
                        <div class="reaction-btn ${likeClass}" onclick="handleReaction(${clipId}, 'like')">
                            <div class="reaction-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></div>
                            <span class="reaction-count">${clip.likes || 0}</span>
                            <span class="reaction-label">Нравится</span>
                        </div>
                        <div class="reaction-btn ${dislikeClass}" onclick="handleReaction(${clipId}, 'dislike')">
                            <div class="reaction-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H7m10 0h3a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"/></svg></div>
                            <span class="reaction-count">${clip.dislikes || 0}</span>
                            <span class="reaction-label">Не нравится</span>
                        </div>
                    </div>
                    
                    <div class="comments-section">${commentsHtml || '<div style="text-align:center; color:rgba(255,255,255,0.2);">Нет комментариев</div>'}</div>
                    
                    <div style="display:flex; gap:8px; margin:14px 0;">
                        <input type="text" class="admin-input" id="newComment" placeholder="Комментарий..." style="flex:1; padding:12px; text-align:left;">
                        <button class="admin-btn" onclick="addComment(${clipId})" style="width:auto; padding:12px 18px;">➤</button>
                    </div>
                    
                    <button class="admin-btn secondary" onclick="closeModal()">Закрыть</button>
                </div>
            `;
            
            document.body.appendChild(modal);
        };

        window.handleReaction = function(clipId, type) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (!clip) return;
            
            if (clip.userReaction === type) {
                clip[type === 'like' ? 'likes' : 'dislikes'] = (clip[type === 'like' ? 'likes' : 'dislikes'] || 0) - 1;
                clip.userReaction = null;
            } else {
                if (clip.userReaction) {
                    clip[clip.userReaction === 'like' ? 'likes' : 'dislikes'] = (clip[clip.userReaction === 'like' ? 'likes' : 'dislikes'] || 0) - 1;
                }
                clip[type === 'like' ? 'likes' : 'dislikes'] = (clip[type === 'like' ? 'likes' : 'dislikes'] || 0) + 1;
                clip.userReaction = type;
            }
            
            saveData();
            closeModal();
            openClip(clipId);
        };

        window.addComment = function(clipId) {
            const comment = document.getElementById('newComment')?.value;
            if (comment?.trim()) {
                const clip = appData.clips.find(c => c.id === clipId);
                if (clip) {
                    if (!clip.comments) clip.comments = [];
                    clip.comments.push('Вы: ' + comment.trim());
                    saveData();
                }
                closeModal();
                openClip(clipId);
            }
        };

        window.closeModal = function() {
            document.getElementById('clipModal')?.remove();
            document.getElementById('addGoalModal')?.remove();
            document.getElementById('editGoalModal')?.remove();
            document.querySelector('.modal')?.remove();
        };

        window.changeMonth = function(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderPage();
        };

        window.selectDate = function(date) {
            selectedDate = date;
            renderPage();
        };

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}`;
        }

        window.toggleCancelTraining = function(date, time, name) {
            if (!isAdmin) return;
            
            const trainingKey = `${time} ${name}`;
            
            if (!appData.cancelledTrainings[date]) {
                appData.cancelledTrainings[date] = [];
            }
            
            const index = appData.cancelledTrainings[date].indexOf(trainingKey);
            
            if (index === -1) {
                appData.cancelledTrainings[date].push(trainingKey);
                showToast('❌ Тренировка отменена');
            } else {
                appData.cancelledTrainings[date].splice(index, 1);
                showToast('✅ Тренировка восстановлена');
            }
            
            if (appData.cancelledTrainings[date].length === 0) {
                delete appData.cancelledTrainings[date];
            }
            
            saveData();
            renderPage();
        };

        window.addClip = function() {
            if (!isAdmin) return;
            const title = document.getElementById('clipTitle')?.value;
            const desc = document.getElementById('clipDesc')?.value;
            const url = document.getElementById('clipUrl')?.value;
            
            if (title && desc && url) {
                appData.clips.push({
                    id: appData.clips.length + 1,
                    title, 
                    description: desc, 
                    url,
                    likes: 0, 
                    dislikes: 0, 
                    userReaction: null, 
                    comments: []
                });
                
                ['clipTitle', 'clipDesc', 'clipUrl'].forEach(id => document.getElementById(id).value = '');
                saveData();
                if (currentPage === 'clips') renderPage();
                showToast('Клип добавлен');
            }
        };

        window.saveRules = function() {
            if (!isAdmin) return;
            const rules = document.getElementById('rulesText')?.value;
            if (rules) {
                appData.rules = rules;
                saveData();
                showToast('Правила сохранены');
            }
        };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
