<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO CLIPS - Танцевальные клипы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0f20 50%, #2d1b3a 100%);
            min-height: 100vh;
            color: white;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(156, 39, 176, 0.15) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wNCIgLz48L3N2Zz4=');
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            border: 1px solid rgba(156, 39, 176, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: slideDown 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-100px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #e1bee7 50%, #ce93d8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            position: relative;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #9c27b0, transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .admin-badge {
            background: linear-gradient(135deg, #6a1b9a, #9c27b0);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4);
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 4px 15px rgba(156, 39, 176, 0.4); }
            50% { box-shadow: 0 4px 25px rgba(156, 39, 176, 0.8); }
        }

        .admin-badge:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, #7b1fa2, #ab47bc);
        }

        /* Сетка клипов */
        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        /* Карточка клипа */
        .clip-card {
            background: rgba(20, 10, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(156, 39, 176, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .clip-card:nth-child(1) { animation-delay: 0.1s; }
        .clip-card:nth-child(2) { animation-delay: 0.2s; }
        .clip-card:nth-child(3) { animation-delay: 0.3s; }
        .clip-card:nth-child(4) { animation-delay: 0.4s; }
        .clip-card:nth-child(5) { animation-delay: 0.5s; }
        .clip-card:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .clip-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #ce93d8;
            box-shadow: 0 20px 40px rgba(156, 39, 176, 0.4);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            background: #000;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .clip-card:hover video {
            transform: scale(1.05);
        }

        .clip-info {
            padding: 20px;
        }

        .clip-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clip-description {
            font-size: 14px;
            color: #b39ddb;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        /* Панель взаимодействия */
        .interaction-bar {
            display: flex;
            gap: 20px;
            padding: 0 20px 20px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(156, 39, 176, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }

        .action-btn:hover {
            background: rgba(156, 39, 176, 0.3);
            border-color: #ce93d8;
            transform: scale(1.05);
        }

        .action-btn.liked {
            background: #9c27b0;
            border-color: #fff;
            animation: likePop 0.3s ease;
        }

        @keyframes likePop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Комментарии */
        .comments-section {
            padding: 0 20px 20px;
        }

        .comment-input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .comment-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(156, 39, 176, 0.3);
            border-radius: 50px;
            padding: 12px 20px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .comment-input:focus {
            outline: none;
            border-color: #ce93d8;
            box-shadow: 0 0 15px rgba(156, 39, 176, 0.5);
            background: rgba(0, 0, 0, 0.5);
        }

        .comment-btn {
            background: linear-gradient(135deg, #9c27b0, #6a1b9a);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .comment-btn:hover {
            transform: rotate(90deg) scale(1.1);
            background: linear-gradient(135deg, #ab47bc, #7b1fa2);
        }

        .comments-list {
            max-height: 200px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .comments-list::-webkit-scrollbar {
            width: 5px;
        }

        .comments-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .comments-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #9c27b0, #6a1b9a);
            border-radius: 10px;
        }

        .comment-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 10px 15px;
            margin-bottom: 10px;
            animation: slideIn 0.3s ease;
            border-left: 3px solid #9c27b0;
        }

        @keyframes slideIn {
            0% { opacity: 0; transform: translateX(-20px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .comment-author {
            font-size: 12px;
            color: #ce93d8;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .comment-text {
            font-size: 14px;
            color: #fff;
            word-break: break-word;
        }

        .comment-time {
            font-size: 10px;
            color: #9575cd;
            margin-top: 4px;
            text-align: right;
        }

        /* Админ-панель */
        .admin-panel {
            background: rgba(20, 10, 30, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px;
            margin-bottom: 40px;
            border: 2px solid rgba(156, 39, 176, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            animation: slideInPanel 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideInPanel {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .admin-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(156, 39, 176, 0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .admin-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #ce93d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(156, 39, 176, 0.3);
            border-radius: 20px;
            padding: 15px 20px;
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .admin-input:focus {
            outline: none;
            border-color: #ce93d8;
            box-shadow: 0 0 20px rgba(156, 39, 176, 0.5);
            transform: scale(1.02);
        }

        .admin-file-input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px dashed rgba(156, 39, 176, 0.5);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .admin-file-input:hover {
            border-color: #ce93d8;
            background: rgba(156, 39, 176, 0.1);
            transform: scale(1.02);
        }

        .admin-file-input input {
            display: none;
        }

        .admin-file-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: #b39ddb;
            cursor: pointer;
        }

        .admin-file-label span:first-child {
            font-size: 40px;
        }

        .admin-submit {
            background: linear-gradient(135deg, #9c27b0, #6a1b9a);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 10px;
        }

        .admin-submit:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 30px rgba(156, 39, 176, 0.6);
        }

        /* Лоадер */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .spinner {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            position: relative;
        }

        .spinner div {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: #9c27b0;
            border-radius: 50%;
            animation: spinnerOne 1.2s linear infinite;
        }

        .spinner div:nth-child(2) {
            border: 4px solid transparent;
            border-bottom-color: #ce93d8;
            animation: spinnerTwo 1.2s linear infinite;
        }

        @keyframes spinnerOne {
            0% { transform: rotate(0deg); border-width: 4px; }
            50% { transform: rotate(180deg); border-width: 2px; }
            100% { transform: rotate(360deg); border-width: 4px; }
        }

        @keyframes spinnerTwo {
            0% { transform: rotate(0deg); border-width: 2px; }
            50% { transform: rotate(180deg); border-width: 4px; }
            100% { transform: rotate(360deg); border-width: 2px; }
        }

        .loader-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ce93d8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Сообщения */
        .message {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #9c27b0, #6a1b9a);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: slideInRight 0.3s ease;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideInRight {
            0% { transform: translateX(100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .message.fade-out {
            animation: fadeOut 0.3s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            
            .clips-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Кнопка шаринга */
        .share-btn {
            background: none;
            border: none;
            color: #b39ddb;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 5px 10px;
        }

        .share-btn:hover {
            color: #ce93d8;
            transform: scale(1.2) rotate(360deg);
        }

        /* Статус загрузки */
        .upload-status {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 10, 30, 0.95);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #9c27b0;
            text-align: center;
            z-index: 10000;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .upload-status .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
        }

        .upload-status p {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .upload-status small {
            color: #b39ddb;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="spinner">
                <div></div>
                <div></div>
            </div>
            <div class="loader-text">PRO CLIPS</div>
        </div>
    </div>

    <div class="gradient-bg"></div>
    <div class="noise"></div>

    <div class="container">
        <header class="header">
            <div class="logo">🎬 PRO CLIPS</div>
            <div class="admin-badge" onclick="toggleAdminPanel()">⚡ Админ-панель</div>
        </header>

        <div id="adminPanel" class="admin-panel" style="display: none;">
            <h2 class="admin-title">➕ Добавить новый клип</h2>
            <form class="admin-form" id="addClipForm">
                <input type="text" class="admin-input" id="clipTitle" placeholder="Название клипа" required>
                <textarea class="admin-input" id="clipDescription" placeholder="Описание клипа" rows="3" required></textarea>
                
                <div class="admin-file-input" onclick="document.getElementById('videoFile').click()">
                    <input type="file" id="videoFile" accept="video/*" required>
                    <div class="admin-file-label">
                        <span>📹</span>
                        <span>Нажмите, чтобы выбрать видео</span>
                        <span id="fileName" style="color: #ce93d8; font-size: 14px;"></span>
                    </div>
                </div>

                <input type="text" class="admin-input" id="previewUrl" placeholder="Ссылка на превью (необязательно)">

                <button type="submit" class="admin-submit">
                    ✨ Опубликовать клип
                </button>
            </form>
        </div>

        <div id="clipsContainer" class="clips-grid"></div>
    </div>

    <div id="uploadStatus" class="upload-status" style="display: none;">
        <div class="spinner">
            <div></div>
            <div></div>
        </div>
        <p>Загрузка клипа...</p>
        <small>Пожалуйста, подождите</small>
    </div>

    <div id="messageContainer"></div>

    <script>
        // Состояние приложения
        let clips = [];
        let currentUser = {
            id: 'user_' + Math.random().toString(36).substr(2, 9),
            name: 'Танцор ' + Math.floor(Math.random() * 1000)
        };
        let isAdmin = true; // В реальном приложении проверяйте через Telegram

        // Загрузка данных из localStorage
        function loadClips() {
            const saved = localStorage.getItem('proClips');
            if (saved) {
                clips = JSON.parse(saved);
            } else {
                // Тестовые данные
                clips = [
                    {
                        id: '1',
                        title: 'Мастер-класс по хип-хопу',
                        description: 'Урок от Алексея. Базовые движения и связки',
                        videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',
                        previewUrl: 'https://images.unsplash.com/photo-1547153760-18fc86324498',
                        likes: 156,
                        comments: [],
                        date: new Date().toISOString()
                    },
                    {
                        id: '2',
                        title: 'Contemporary. Эмоции в танце',
                        description: 'Мастер-класс от Елены. Работа с эмоциями',
                        videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4',
                        previewUrl: 'https://images.unsplash.com/photo-1508700929628-666bc8bd84ea',
                        likes: 234,
                        comments: [],
                        date: new Date().toISOString()
                    }
                ];
            }
            renderClips();
        }

        // Сохранение данных
        function saveClips() {
            localStorage.setItem('proClips', JSON.stringify(clips));
        }

        // Рендер клипов
        function renderClips() {
            const container = document.getElementById('clipsContainer');
            container.innerHTML = '';

            clips.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach(clip => {
                const clipElement = createClipElement(clip);
                container.appendChild(clipElement);
            });
        }

        // Создание элемента клипа
        function createClipElement(clip) {
            const div = document.createElement('div');
            div.className = 'clip-card';
            div.id = `clip-${clip.id}`;

            const likedByUser = clip.likedBy?.includes(currentUser.id) || false;
            const likeCount = clip.likes || 0;

            div.innerHTML = `
                <div class="video-container">
                    <video src="${clip.videoUrl}" poster="${clip.previewUrl}" controls></video>
                </div>
                <div class="clip-info">
                    <h3 class="clip-title">${clip.title}</h3>
                    <p class="clip-description">${clip.description}</p>
                </div>
                <div class="interaction-bar">
                    <button class="action-btn ${likedByUser ? 'liked' : ''}" onclick="handleLike('${clip.id}')">
                        <span>❤️</span> <span id="likes-${clip.id}">${likeCount}</span>
                    </button>
                    <button class="action-btn" onclick="toggleComments('${clip.id}')">
                        💬 <span id="comments-count-${clip.id}">${clip.comments?.length || 0}</span>
                    </button>
                    <button class="share-btn" onclick="shareClip('${clip.id}')">📤</button>
                </div>
                <div class="comments-section" id="comments-${clip.id}" style="display: none;">
                    <div class="comment-input-container">
                        <input type="text" class="comment-input" id="comment-input-${clip.id}" placeholder="Написать комментарий...">
                        <button class="comment-btn" onclick="addComment('${clip.id}')">➤</button>
                    </div>
                    <div class="comments-list" id="comments-list-${clip.id}">
                        ${renderComments(clip.comments || [])}
                    </div>
                </div>
            `;

            return div;
        }

        // Рендер комментариев
        function renderComments(comments) {
            if (!comments.length) return '<p style="color: #b39ddb; text-align: center; padding: 20px;">Пока нет комментариев</p>';
            
            return comments.map(comment => `
                <div class="comment-item">
                    <div class="comment-author">${comment.author}</div>
                    <div class="comment-text">${comment.text}</div>
                    <div class="comment-time">${new Date(comment.date).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // Обработка лайков
        window.handleLike = function(clipId) {
            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (!clip.likedBy) clip.likedBy = [];
            if (!clip.likes) clip.likes = 0;

            const userLiked = clip.likedBy.includes(currentUser.id);
            
            if (userLiked) {
                clip.likedBy = clip.likedBy.filter(id => id !== currentUser.id);
                clip.likes--;
            } else {
                clip.likedBy.push(currentUser.id);
                clip.likes++;
            }

            saveClips();
            
            const likesSpan = document.getElementById(`likes-${clipId}`);
            if (likesSpan) likesSpan.textContent = clip.likes;

            const likeBtn = document.querySelector(`#clip-${clipId} .action-btn:first-child`);
            if (likeBtn) {
                if (!userLiked) {
                    likeBtn.classList.add('liked');
                    likeBtn.style.animation = 'likePop 0.3s ease';
                } else {
                    likeBtn.classList.remove('liked');
                }
            }

            showMessage(userLiked ? '👎 Лайк убран' : '❤️ Лайк поставлен!');
        };

        // Добавление комментария
        window.addComment = function(clipId) {
            const input = document.getElementById(`comment-input-${clipId}`);
            const text = input.value.trim();
            
            if (!text) {
                showMessage('❌ Напишите комментарий');
                return;
            }

            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (!clip.comments) clip.comments = [];

            const comment = {
                id: 'comm_' + Math.random().toString(36).substr(2, 9),
                author: currentUser.name,
                text: text,
                date: new Date().toISOString()
            };

            clip.comments.push(comment);
            saveClips();

            // Обновляем список комментариев
            const commentsList = document.getElementById(`comments-list-${clipId}`);
            commentsList.innerHTML = renderComments(clip.comments);

            // Обновляем счетчик
            const countSpan = document.getElementById(`comments-count-${clipId}`);
            if (countSpan) countSpan.textContent = clip.comments.length;

            input.value = '';
            showMessage('💬 Комментарий добавлен');

            // Анимация нового комментария
            const newComment = commentsList.lastElementChild;
            if (newComment) {
                newComment.style.animation = 'slideIn 0.3s ease';
            }
        };

        // Переключение комментариев
        window.toggleComments = function(clipId) {
            const commentsDiv = document.getElementById(`comments-${clipId}`);
            if (commentsDiv) {
                if (commentsDiv.style.display === 'none') {
                    commentsDiv.style.display = 'block';
                    commentsDiv.style.animation = 'slideIn 0.3s ease';
                } else {
                    commentsDiv.style.display = 'none';
                }
            }
        };

        // Шаринг
        window.shareClip = function(clipId) {
            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (navigator.share) {
                navigator.share({
                    title: clip.title,
                    text: clip.description,
                    url: window.location.href
                }).catch(() => {
                    copyToClipboard(window.location.href);
                });
            } else {
                copyToClipboard(window.location.href);
            }
        };

        // Копирование в буфер обмена
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showMessage('🔗 Ссылка скопирована');
            }).catch(() => {
                showMessage('❌ Ошибка копирования');
            });
        }

        // Переключение админ-панели
        window.toggleAdminPanel = function() {
            const panel = document.getElementById('adminPanel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                panel.style.animation = 'slideInPanel 0.5s ease';
            } else {
                panel.style.display = 'none';
            }
        };

        // Обработка формы добавления клипа
        document.getElementById('addClipForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('clipTitle').value;
            const description = document.getElementById('clipDescription').value;
            const videoFile = document.getElementById('videoFile').files[0];
            const previewUrl = document.getElementById('previewUrl').value;

            if (!videoFile) {
                showMessage('❌ Выберите видео');
                return;
            }

            // Показываем статус загрузки
            document.getElementById('uploadStatus').style.display = 'block';

            try {
                // Создаем URL для видео
                const videoUrl = URL.createObjectURL(videoFile);

                // Создаем новый клип
                const newClip = {
                    id: 'clip_' + Math.random().toString(36).substr(2, 9),
                    title: title,
                    description: description,
                    videoUrl: videoUrl,
                    previewUrl: previewUrl || 'https://images.unsplash.com/photo-1547153760-18fc86324498',
                    likes: 0,
                    likedBy: [],
                    comments: [],
                    date: new Date().toISOString()
                };

                clips.push(newClip);
                saveClips();
                
                // Скрываем статус загрузки
                document.getElementById('uploadStatus').style.display = 'none';

                // Очищаем форму
                document.getElementById('clipTitle').value = '';
                document.getElementById('clipDescription').value = '';
                document.getElementById('videoFile').value = '';
                document.getElementById('previewUrl').value = '';
                document.getElementById('fileName').textContent = '';

                // Перерендериваем клипы
                renderClips();

                showMessage('✅ Клип успешно добавлен!');

                // Прокручиваем к новому клипу
                setTimeout(() => {
                    document.getElementById(`clip-${newClip.id}`)?.scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'center' 
                    });
                }, 100);

            } catch (error) {
                console.error('Ошибка:', error);
                document.getElementById('uploadStatus').style.display = 'none';
                showMessage('❌ Ошибка при загрузке');
            }
        });

        // Отображение имени файла
        document.getElementById('videoFile').addEventListener('change', (e) => {
            const fileName = e.target.files[0]?.name;
            document.getElementById('fileName').textContent = fileName || '';
        });

        // Показ сообщений
        function showMessage(text, duration = 3000) {
            const container = document.getElementById('messageContainer');
            const message = document.createElement('div');
            message.className = 'message';
            message.textContent = text;
            
            container.appendChild(message);

            setTimeout(() => {
                message.classList.add('fade-out');
                setTimeout(() => {
                    message.remove();
                }, 300);
            }, duration);
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            // Скрываем лоадер
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1500);

            // Загружаем клипы
            loadClips();

            // Добавляем анимацию появления для карточек
            const cards = document.querySelectorAll('.clip-card');
            cards.forEach((card, index) => {
                card.style.animationDelay = `${index * 0.1}s`;
            });
        });

        // Telegram Web App интеграция
        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.expand();
            tg.ready();
            
            // Получаем данные пользователя из Telegram
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                currentUser = {
                    id: tg.initDataUnsafe.user.id,
                    name: tg.initDataUnsafe.user.first_name || 'Танцор'
                };
            }
            
            // Устанавливаем тему Telegram
            if (tg.colorScheme === 'dark') {
                document.body.classList.add('tg-dark');
            }
        }
    </script>
</body>
</html>
