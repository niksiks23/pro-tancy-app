<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO CLIPS • Танцевальное пространство</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        :root {
            --primary: #9d4edd;
            --primary-dark: #6a2c70;
            --primary-light: #c77dff;
            --bg-dark: #030104;
            --bg-card: rgba(10, 5, 20, 0.8);
            --text-primary: #ffffff;
            --text-secondary: #b5a1cc;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow-x: hidden;
            width: 100%;
        }

        /* Анимированный фон */
        #gradient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            will-change: transform;
            transform: translateZ(0);
        }

        /* Основной контент */
        .app {
            position: relative;
            z-index: 10;
            max-width: 1440px;
            margin: 0 auto;
            padding: 12px 16px;
            width: 100%;
        }

        /* Навбар */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            background: rgba(10, 5, 20, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 78, 221, 0.2);
            border-radius: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            animation: navGlide 0.6s ease;
        }

        @keyframes navGlide {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transform: rotate(45deg);
        }

        .logo-icon span {
            transform: rotate(-45deg);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(157, 78, 221, 0.1);
            padding: 6px 12px 6px 8px;
            border-radius: 30px;
            border: 1px solid rgba(157, 78, 221, 0.3);
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .user-name {
            font-weight: 600;
            color: #fff;
            font-size: 14px;
        }

        /* Кнопка админа */
        .admin-button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.3);
            white-space: nowrap;
        }

        .admin-button.hidden {
            display: none;
        }

        /* Админ панель */
        .admin-panel {
            background: rgba(10, 5, 20, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 78, 221, 0.3);
            border-radius: 30px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            animation: panelSlide 0.4s ease;
        }

        @keyframes panelSlide {
            0% { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .admin-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .admin-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
        }

        .admin-badge {
            background: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .admin-form {
            display: grid;
            gap: 16px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary-light);
            margin-bottom: 4px;
            display: block;
        }

        .form-group input,
        .form-group textarea {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(157, 78, 221, 0.2);
            border-radius: 16px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            width: 100%;
        }

        .file-upload {
            background: rgba(157, 78, 221, 0.05);
            border: 1px dashed rgba(157, 78, 221, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
        }

        .file-upload input {
            display: none;
        }

        .upload-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .upload-text {
            font-size: 14px;
            font-weight: 600;
        }

        .upload-hint {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 4px;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
        }

        /* Фильтры */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: rgba(157, 78, 221, 0.1);
            border: 1px solid rgba(157, 78, 221, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* Сетка клипов */
        .clips-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Карточка клипа */
        .clip-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(157, 78, 221, 0.2);
            border-radius: 24px;
            overflow: hidden;
            transition: transform 0.2s;
            animation: cardFloat 0.4s ease-out forwards;
            opacity: 0;
        }

        @keyframes cardFloat {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background: #000;
            cursor: pointer;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .video-wrapper:active .video-overlay {
            opacity: 1;
        }

        .play-button {
            width: 50px;
            height: 50px;
            background: rgba(157, 78, 221, 0.9);
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .clip-content {
            padding: 16px;
        }

        .clip-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            color: #fff;
        }

        .clip-description {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .clip-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(157, 78, 221, 0.2);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clip-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            background: rgba(157, 78, 221, 0.1);
            border: 1px solid rgba(157, 78, 221, 0.2);
            color: white;
            padding: 10px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .action-btn:active {
            background: var(--primary);
            transform: scale(0.98);
        }

        .action-btn.liked {
            background: var(--primary);
        }

        .share-btn {
            width: 40px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
        }

        /* Комментарии */
        .comments-section {
            padding: 0 16px 16px;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .comment-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(157, 78, 221, 0.2);
            border-radius: 20px;
            padding: 10px 14px;
            color: white;
            font-size: 13px;
        }

        .comment-send {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .comments-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .comment {
            background: rgba(157, 78, 221, 0.1);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .comment-author {
            font-weight: 700;
            color: var(--primary-light);
            font-size: 12px;
            margin-bottom: 4px;
        }

        .comment-text {
            color: white;
            font-size: 13px;
        }

        .comment-time {
            color: #8a6cb8;
            font-size: 10px;
            margin-top: 4px;
            text-align: right;
        }

        /* Полноэкранный плеер */
        .fullscreen-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .fullscreen-player.active {
            display: flex;
        }

        .fullscreen-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .close-player {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            z-index: 10001;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Лоадер */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100000;
            transition: opacity 0.3s;
        }

        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(157, 78, 221, 0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            left: 20px;
            background: rgba(10, 5, 20, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--primary);
            color: white;
            padding: 14px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            text-align: center;
            animation: toastIn 0.3s;
            z-index: 1000;
            max-width: 300px;
            margin: 0 auto;
        }

        @keyframes toastIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Адаптация для больших экранов */
        @media (min-width: 768px) {
            .app {
                padding: 20px 40px;
            }
            
            .clips-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .toast {
                left: auto;
                right: 40px;
                min-width: 300px;
            }
        }

        @media (min-width: 1024px) {
            .clips-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>
    <canvas id="gradient-canvas"></canvas>

    <!-- Полноэкранный плеер -->
    <div class="fullscreen-player" id="fullscreenPlayer">
        <video class="fullscreen-video" id="fullscreenVideo" controls playsinline webkit-playsinline>
            <source src="" type="video/mp4">
        </video>
        <button class="close-player" onclick="closeFullscreenPlayer()">✕</button>
    </div>

    <!-- Лоадер -->
    <div class="loader" id="loader">
        <div class="loader-spinner"></div>
    </div>

    <div class="app">
        <!-- Навигация -->
        <nav class="navbar">
            <div class="logo">
                <div class="logo-icon">
                    <span>💃</span>
                </div>
                <span class="logo-text">PRO CLIPS</span>
            </div>
            
            <div class="nav-actions">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <span class="user-name" id="userName">Загрузка...</span>
                </div>
                
                <button class="admin-button" id="adminButton" onclick="toggleAdminPanel()">
                    <span>⚡</span>
                    <span class="admin-text">Админ</span>
                </button>
            </div>
        </nav>

        <!-- Админ панель -->
        <div class="admin-panel" id="adminPanel" style="display: none;">
            <div class="admin-header">
                <h2>Добавить клип</h2>
                <div class="admin-badge">Только вы</div>
            </div>
            
            <form class="admin-form" id="addClipForm">
                <div class="form-group">
                    <label>Название</label>
                    <input type="text" id="clipTitle" placeholder="Например: Мастер-класс по хип-хопу" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="clipDescription" rows="3" placeholder="Опишите клип" required></textarea>
                </div>
                
                <div class="file-upload" onclick="document.getElementById('videoFile').click()">
                    <input type="file" id="videoFile" accept="video/*" required>
                    <span class="upload-icon">🎥</span>
                    <div class="upload-text" id="uploadText">Выберите видео</div>
                    <div class="upload-hint" id="fileName"></div>
                </div>
                
                <button type="submit" class="submit-btn">
                    Опубликовать
                </button>
            </form>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <button class="filter-btn active">Все</button>
            <button class="filter-btn">Популярное</button>
            <button class="filter-btn">Новинки</button>
            <button class="filter-btn">Hip-Hop</button>
            <button class="filter-btn">Contemporary</button>
            <button class="filter-btn">Bollywood</button>
        </div>

        <!-- Сетка клипов -->
        <div class="clips-grid" id="clipsContainer"></div>
    </div>

    <!-- Уведомления -->
    <div id="toastContainer"></div>

    <script>
        // ВАШ Telegram ID
        const YOUR_TELEGRAM_ID = 123456789; // ЗАМЕНИТЕ НА СВОЙ ID!
        
        // Текущий пользователь
        let currentUser = {
            id: null,
            name: 'Гость'
        };
        
        // Данные
        let clips = [];

        // Полноэкранный плеер
        window.openFullscreenPlayer = function(videoUrl) {
            const player = document.getElementById('fullscreenPlayer');
            const video = document.getElementById('fullscreenVideo');
            
            video.src = videoUrl;
            video.load();
            player.classList.add('active');
            
            // Автовоспроизведение
            setTimeout(() => {
                video.play().catch(e => console.log('Автовоспроизведение не удалось'));
            }, 100);
        };

        window.closeFullscreenPlayer = function() {
            const player = document.getElementById('fullscreenPlayer');
            const video = document.getElementById('fullscreenVideo');
            
            // Выход из полноэкранного режима
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
            
            video.pause();
            video.src = '';
            video.load();
            player.classList.remove('active');
        };

        // Инициализация Telegram
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    currentUser = {
                        id: tg.initDataUnsafe.user.id,
                        name: tg.initDataUnsafe.user.first_name || 'Танцор'
                    };
                    
                    document.getElementById('userName').textContent = currentUser.name;
                    document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
                    
                    // Проверка админа
                    const adminButton = document.getElementById('adminButton');
                    if (currentUser.id === YOUR_TELEGRAM_ID) {
                        adminButton.style.display = 'flex';
                    } else {
                        adminButton.style.display = 'none';
                    }
                }
            } else {
                // Режим отладки
                currentUser = {
                    id: YOUR_TELEGRAM_ID,
                    name: 'Админ'
                };
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userAvatar').textContent = 'А';
                document.getElementById('adminButton').style.display = 'flex';
            }
        }

        // Загрузка клипов
        function loadClips() {
            const saved = localStorage.getItem('proClips');
            if (saved) {
                clips = JSON.parse(saved);
            } else {
                // Тестовые данные
                clips = [
                    {
                        id: '1',
                        title: 'Хип-хоп мастер-класс',
                        description: 'Урок от Алексея. Базовые движения',
                        videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',
                        likes: 156,
                        likedBy: [],
                        comments: [],
                        date: new Date().toISOString()
                    },
                    {
                        id: '2',
                        title: 'Contemporary',
                        description: 'Работа с эмоциями',
                        videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4',
                        likes: 234,
                        likedBy: [],
                        comments: [],
                        date: new Date().toISOString()
                    }
                ];
            }
            renderClips();
        }

        // Сохранение
        function saveClips() {
            localStorage.setItem('proClips', JSON.stringify(clips));
        }

        // Рендер клипов
        function renderClips() {
            const container = document.getElementById('clipsContainer');
            container.innerHTML = '';

            clips.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach((clip, index) => {
                const card = createClipCard(clip);
                card.style.animationDelay = `${index * 0.1}s`;
                container.appendChild(card);
            });
        }

        // Создание карточки
        function createClipCard(clip) {
            const div = document.createElement('div');
            div.className = 'clip-card';
            div.id = `clip-${clip.id}`;

            const liked = clip.likedBy?.includes(currentUser.id) || false;

            div.innerHTML = `
                <div class="video-wrapper" onclick="openFullscreenPlayer('${clip.videoUrl}')">
                    <video src="${clip.videoUrl}" loop muted playsinline webkit-playsinline></video>
                    <div class="video-overlay">
                        <div class="play-button">▶</div>
                    </div>
                </div>
                
                <div class="clip-content">
                    <h3 class="clip-title">${clip.title}</h3>
                    <p class="clip-description">${clip.description}</p>
                    
                    <div class="clip-meta">
                        <div class="meta-item">
                            <span>📅</span>
                            ${new Date(clip.date).toLocaleDateString()}
                        </div>
                        <div class="meta-item">
                            <span>💬</span>
                            ${clip.comments?.length || 0}
                        </div>
                    </div>
                    
                    <div class="clip-actions">
                        <button class="action-btn ${liked ? 'liked' : ''}" onclick="event.stopPropagation(); handleLike('${clip.id}')">
                            <span>❤️</span>
                            <span id="likes-${clip.id}">${clip.likes || 0}</span>
                        </button>
                        
                        <button class="action-btn" onclick="event.stopPropagation(); toggleComments('${clip.id}')">
                            💬
                        </button>
                        
                        <button class="share-btn" onclick="event.stopPropagation(); shareClip('${clip.id}')">
                            📤
                        </button>
                    </div>
                </div>
                
                <div class="comments-section" id="comments-${clip.id}" style="display: none;">
                    <div class="comment-input-wrapper">
                        <input type="text" class="comment-input" id="comment-input-${clip.id}" placeholder="Комментарий...">
                        <button class="comment-send" onclick="addComment('${clip.id}')">➤</button>
                    </div>
                    
                    <div class="comments-list" id="comments-list-${clip.id}">
                        ${renderComments(clip.comments || [])}
                    </div>
                </div>
            `;

            // Hover для видео на десктопе
            const video = div.querySelector('video');
            if (window.innerWidth > 768) {
                div.addEventListener('mouseenter', () => video.play());
                div.addEventListener('mouseleave', () => {
                    video.pause();
                    video.currentTime = 0;
                });
            }

            return div;
        }

        // Рендер комментариев
        function renderComments(comments) {
            if (!comments.length) {
                return '<p style="color: #8a6cb8; text-align: center; padding: 10px;">Нет комментариев</p>';
            }
            
            return comments.map(comment => `
                <div class="comment">
                    <div class="comment-author">${comment.author}</div>
                    <div class="comment-text">${comment.text}</div>
                    <div class="comment-time">${new Date(comment.date).toLocaleTimeString()}</div>
                </div>
            `).join('');
        }

        // Лайки
        window.handleLike = function(clipId) {
            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (!clip.likedBy) clip.likedBy = [];
            if (!clip.likes) clip.likes = 0;

            const liked = clip.likedBy.includes(currentUser.id);
            
            if (liked) {
                clip.likedBy = clip.likedBy.filter(id => id !== currentUser.id);
                clip.likes--;
            } else {
                clip.likedBy.push(currentUser.id);
                clip.likes++;
            }

            saveClips();
            
            const likesSpan = document.getElementById(`likes-${clipId}`);
            if (likesSpan) likesSpan.textContent = clip.likes;

            const likeBtn = document.querySelector(`#clip-${clipId} .action-btn:first-child`);
            if (likeBtn) {
                if (!liked) {
                    likeBtn.classList.add('liked');
                } else {
                    likeBtn.classList.remove('liked');
                }
            }

            showToast(liked ? '👎 Лайк убран' : '❤️ Лайк поставлен');
        };

        // Комментарии
        window.addComment = function(clipId) {
            const input = document.getElementById(`comment-input-${clipId}`);
            const text = input.value.trim();
            
            if (!text) {
                showToast('❌ Напишите комментарий');
                return;
            }

            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (!clip.comments) clip.comments = [];

            const comment = {
                id: 'c' + Date.now(),
                author: currentUser.name,
                text: text,
                date: new Date().toISOString()
            };

            clip.comments.push(comment);
            saveClips();

            const commentsList = document.getElementById(`comments-list-${clipId}`);
            commentsList.innerHTML = renderComments(clip.comments);

            input.value = '';
            showToast('💬 Комментарий добавлен');
        };

        window.toggleComments = function(clipId) {
            const commentsDiv = document.getElementById(`comments-${clipId}`);
            if (commentsDiv) {
                commentsDiv.style.display = commentsDiv.style.display === 'none' ? 'block' : 'none';
            }
        };

        // Шаринг
        window.shareClip = function(clipId) {
            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (navigator.share) {
                navigator.share({
                    title: clip.title,
                    text: clip.description,
                    url: window.location.href
                }).catch(() => {
                    copyToClipboard(window.location.href);
                });
            } else {
                copyToClipboard(window.location.href);
            }
        };

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('🔗 Ссылка скопирована');
            });
        }

        // Админ панель
        window.toggleAdminPanel = function() {
            if (currentUser.id !== YOUR_TELEGRAM_ID) {
                showToast('⛔ Доступ запрещен');
                return;
            }

            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        };

        // Добавление клипа
        document.getElementById('addClipForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (currentUser.id !== YOUR_TELEGRAM_ID) {
                showToast('⛔ Только администратор');
                return;
            }

            const title = document.getElementById('clipTitle').value;
            const description = document.getElementById('clipDescription').value;
            const videoFile = document.getElementById('videoFile').files[0];

            if (!videoFile) {
                showToast('❌ Выберите видео');
                return;
            }

            showToast('⏳ Загрузка...');

            try {
                const videoUrl = URL.createObjectURL(videoFile);

                const newClip = {
                    id: 'clip_' + Date.now(),
                    title: title,
                    description: description,
                    videoUrl: videoUrl,
                    likes: 0,
                    likedBy: [],
                    comments: [],
                    date: new Date().toISOString()
                };

                clips.unshift(newClip);
                saveClips();
                
                document.getElementById('addClipForm').reset();
                document.getElementById('fileName').textContent = '';
                document.getElementById('uploadText').textContent = 'Выберите видео';
                
                renderClips();
                showToast('✅ Клип опубликован');
                
                document.getElementById('adminPanel').style.display = 'none';

            } catch (error) {
                showToast('❌ Ошибка загрузки');
            }
        });

        // Отображение имени файла
        document.getElementById('videoFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').textContent = `📹 ${file.name}`;
                document.getElementById('uploadText').textContent = 'Файл выбран:';
            }
        });

        // Уведомления
        function showToast(text, duration = 2000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = text;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, duration);
        }

        // Простой градиент
        function initGradient() {
            const canvas = document.getElementById('gradient-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            resize();
            window.addEventListener('resize', resize);
            
            function draw() {
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#030104');
                gradient.addColorStop(0.5, '#1a0b2e');
                gradient.addColorStop(1, '#030104');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                requestAnimationFrame(draw);
            }
            
            draw();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initTelegram();
            loadClips();
            initGradient();
            
            // Убираем лоадер
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        });

        // Закрытие по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeFullscreenPlayer();
            }
        });

        // Обработка ориентации экрана
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                window.scrollTo(0, 0);
            }, 100);
        });
    </script>
</body>
</html>
