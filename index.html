<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO CLIPS • Танцевальное пространство</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        body {
            background: #030104;
            min-height: 100vh;
            color: #fff;
            position: relative;
        }

        /* Анимированный фон */
        #gradient-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Основной контент */
        .app {
            position: relative;
            z-index: 10;
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px 40px;
        }

        /* Навбар */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 32px;
            background: rgba(10, 5, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 78, 221, 0.2);
            border-radius: 100px;
            margin-bottom: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: navGlide 1s ease;
        }

        @keyframes navGlide {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #9d4edd, #6a2c70);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transform: rotate(45deg);
            transition: 0.3s;
        }

        .logo-icon span {
            transform: rotate(-45deg);
        }

        .logo-text {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #c77dff, #9d4edd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .nav-actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(157, 78, 221, 0.1);
            padding: 8px 20px 8px 12px;
            border-radius: 40px;
            border: 1px solid rgba(157, 78, 221, 0.3);
            transition: 0.3s;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #9d4edd, #6a2c70);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .user-name {
            font-weight: 600;
            color: #fff;
        }

        /* Кнопка админа */
        .admin-button {
            background: linear-gradient(135deg, #9d4edd, #6a2c70);
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
            position: relative;
            overflow: hidden;
        }

        .admin-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .admin-button:hover::before {
            left: 100%;
        }

        .admin-button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 20px 30px rgba(157, 78, 221, 0.5);
        }

        .admin-button.hidden {
            display: none;
        }

        /* Админ панель */
        .admin-panel {
            background: rgba(10, 5, 20, 0.8);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(157, 78, 221, 0.3);
            border-radius: 48px;
            padding: 40px;
            margin-bottom: 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            animation: panelSlide 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        @keyframes panelSlide {
            0% { opacity: 0; transform: translateY(-20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .admin-panel::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(157, 78, 221, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .admin-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .admin-header h2 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-badge {
            background: #9d4edd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .admin-form {
            display: grid;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #c77dff;
            letter-spacing: 0.5px;
            margin-left: 8px;
        }

        .form-group input,
        .form-group textarea {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(157, 78, 221, 0.2);
            border-radius: 24px;
            padding: 16px 24px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
            resize: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #9d4edd;
            box-shadow: 0 0 0 4px rgba(157, 78, 221, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        .file-upload {
            background: rgba(157, 78, 221, 0.05);
            border: 2px dashed rgba(157, 78, 221, 0.3);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-upload:hover {
            border-color: #9d4edd;
            background: rgba(157, 78, 221, 0.1);
            transform: scale(1.02);
        }

        .file-upload input {
            display: none;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .upload-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .upload-hint {
            color: #a988c2;
            font-size: 14px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #9d4edd, #6a2c70);
            border: none;
            color: white;
            padding: 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 16px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 30px rgba(157, 78, 221, 0.4);
        }

        /* Фильтры */
        .filters {
            display: flex;
            gap: 16px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(157, 78, 221, 0.1);
            border: 1px solid rgba(157, 78, 221, 0.2);
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #9d4edd;
            border-color: #9d4edd;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
        }

        /* Сетка клипов */
        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 32px;
            margin-bottom: 60px;
        }

        /* Карточка клипа */
        .clip-card {
            background: rgba(10, 5, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 78, 221, 0.2);
            border-radius: 40px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: cardFloat 0.6s ease-out;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        @keyframes cardFloat {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .clip-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #9d4edd;
            box-shadow: 0 30px 40px rgba(157, 78, 221, 0.3);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            overflow: hidden;
            background: #000;
            cursor: pointer;
        }

        .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s;
        }

        .clip-card:hover video {
            transform: scale(1.1);
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.8) 100%);
            opacity: 0;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .clip-card:hover .video-overlay {
            opacity: 1;
        }

        .play-button {
            width: 70px;
            height: 70px;
            background: rgba(157, 78, 221, 0.9);
            border: 3px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: pulsePlay 2s infinite;
        }

        @keyframes pulsePlay {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .play-button:hover {
            background: #9d4edd;
            transform: scale(1.2);
        }

        .video-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            padding: 0 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .clip-card:hover .video-controls {
            opacity: 1;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }

        .control-btn:hover {
            background: #9d4edd;
            transform: scale(1.1);
        }

        .clip-content {
            padding: 24px;
        }

        .clip-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #e0b3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .clip-description {
            color: #b5a1cc;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .clip-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(157, 78, 221, 0.2);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c2a5e8;
            font-size: 14px;
        }

        /* Действия */
        .clip-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            background: rgba(157, 78, 221, 0.1);
            border: 1px solid rgba(157, 78, 221, 0.2);
            color: white;
            padding: 12px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }

        .action-btn:hover {
            background: #9d4edd;
            border-color: #9d4edd;
            transform: scale(1.05);
        }

        .action-btn.liked {
            background: #9d4edd;
            border-color: #fff;
        }

        .share-btn {
            background: none;
            border: none;
            color: #c2a5e8;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            width: 48px;
        }

        .share-btn:hover {
            color: #9d4edd;
            transform: rotate(360deg) scale(1.2);
        }

        /* Комментарии */
        .comments-section {
            padding: 0 24px 24px;
        }

        .comment-input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .comment-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(157, 78, 221, 0.2);
            border-radius: 30px;
            padding: 14px 20px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

        .comment-input:focus {
            outline: none;
            border-color: #9d4edd;
            box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.2);
        }

        .comment-send {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #9d4edd, #6a2c70);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .comment-send:hover {
            transform: rotate(90deg) scale(1.1);
        }

        .comments-list {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .comments-list::-webkit-scrollbar {
            width: 4px;
        }

        .comments-list::-webkit-scrollbar-track {
            background: rgba(157, 78, 221, 0.1);
            border-radius: 10px;
        }

        .comments-list::-webkit-scrollbar-thumb {
            background: #9d4edd;
            border-radius: 10px;
        }

        .comment {
            background: rgba(157, 78, 221, 0.1);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            animation: commentPop 0.3s;
        }

        @keyframes commentPop {
            0% { opacity: 0; transform: translateX(-10px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        .comment-author {
            font-weight: 700;
            color: #c77dff;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .comment-text {
            color: white;
            font-size: 14px;
            line-height: 1.5;
        }

        .comment-time {
            color: #8a6cb8;
            font-size: 11px;
            margin-top: 8px;
            text-align: right;
        }

        /* Лоадер */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #030104;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: 0.8s;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
        }

        .loader-cube {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            position: relative;
            transform-style: preserve-3d;
            animation: cubeRotate 2s infinite ease;
        }

        .loader-cube div {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #9d4edd, #6a2c70);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .front { transform: translateZ(40px); }
        .back { transform: rotateY(180deg) translateZ(40px); }
        .right { transform: rotateY(90deg) translateZ(40px); }
        .left { transform: rotateY(-90deg) translateZ(40px); }
        .top { transform: rotateX(90deg) translateZ(40px); }
        .bottom { transform: rotateX(-90deg) translateZ(40px); }

        @keyframes cubeRotate {
            0% { transform: rotateX(0) rotateY(0); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }

        .loader-text {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: rgba(10, 5, 20, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid #9d4edd;
            color: white;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.3);
            animation: toastIn 0.3s;
            z-index: 1000;
        }

        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast.fade-out {
            animation: toastOut 0.3s forwards;
        }

        @keyframes toastOut {
            to { transform: translateX(100%); opacity: 0; }
        }

        /* Видео плеер на весь экран */
        .fullscreen-player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(20px);
        }

        .fullscreen-player.active {
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fullscreen-video {
            max-width: 90%;
            max-height: 90%;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(157, 78, 221, 0.5);
        }

        .close-player {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(157, 78, 221, 0.3);
            border: 2px solid white;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 30px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-player:hover {
            background: #9d4edd;
            transform: rotate(90deg);
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .app {
                padding: 10px;
            }
            
            .navbar {
                flex-direction: column;
                gap: 16px;
                border-radius: 30px;
                padding: 20px;
            }
            
            .clips-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <canvas id="gradient-canvas"></canvas>

    <!-- Полноэкранный плеер -->
    <div class="fullscreen-player" id="fullscreenPlayer">
        <video class="fullscreen-video" id="fullscreenVideo" controls></video>
        <button class="close-player" onclick="closeFullscreenPlayer()">✕</button>
    </div>

    <!-- Лоадер -->
    <div class="loader" id="loader">
        <div class="loader-content">
            <div class="loader-cube">
                <div class="front"></div>
                <div class="back"></div>
                <div class="right"></div>
                <div class="left"></div>
                <div class="top"></div>
                <div class="bottom"></div>
            </div>
            <div class="loader-text">PRO CLIPS</div>
        </div>
    </div>

    <div class="app">
        <!-- Навигация -->
        <nav class="navbar">
            <div class="logo">
                <div class="logo-icon">
                    <span>💃</span>
                </div>
                <span class="logo-text">PRO CLIPS</span>
            </div>
            
            <div class="nav-actions">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">👤</div>
                    <span class="user-name" id="userName">Загрузка...</span>
                </div>
                
                <!-- Админ кнопка -->
                <button class="admin-button" id="adminButton" onclick="toggleAdminPanel()">
                    <span>⚡</span>
                    Админ-панель
                </button>
            </div>
        </nav>

        <!-- Админ панель -->
        <div class="admin-panel" id="adminPanel" style="display: none;">
            <div class="admin-header">
                <h2>Добавить новый клип</h2>
                <div class="admin-badge">Только для вас</div>
            </div>
            
            <form class="admin-form" id="addClipForm">
                <div class="form-group">
                    <label>Название клипа</label>
                    <input type="text" id="clipTitle" placeholder="Например: Мастер-класс по хип-хопу" required>
                </div>
                
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="clipDescription" rows="4" placeholder="Опишите клип, добавьте информацию о танцорах, стиле и т.д." required></textarea>
                </div>
                
                <div class="file-upload" onclick="document.getElementById('videoFile').click()">
                    <input type="file" id="videoFile" accept="video/*" required>
                    <span class="upload-icon">🎥</span>
                    <div class="upload-text" id="uploadText">Нажмите, чтобы выбрать видео</div>
                    <div class="upload-hint" id="fileName"></div>
                </div>
                
                <button type="submit" class="submit-btn">
                    ✨ Опубликовать клип
                </button>
            </form>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <button class="filter-btn active">🔥 Все клипы</button>
            <button class="filter-btn">⭐ Популярное</button>
            <button class="filter-btn">🆕 Новинки</button>
            <button class="filter-btn">💃 Hip-Hop</button>
            <button class="filter-btn">🕺 Contemporary</button>
        </div>

        <!-- Сетка клипов -->
        <div class="clips-grid" id="clipsContainer"></div>
    </div>

    <!-- Уведомления -->
    <div id="toastContainer"></div>

    <script>
        // ВАШ Telegram ID
        const YOUR_TELEGRAM_ID = 123456789; // ЗАМЕНИТЕ НА СВОЙ ID!
        
        // Текущий пользователь
        let currentUser = {
            id: null,
            name: 'Гость'
        };
        
        // Данные
        let clips = [];

        // Полноэкранный плеер
        function openFullscreenPlayer(videoUrl) {
            const player = document.getElementById('fullscreenPlayer');
            const video = document.getElementById('fullscreenVideo');
            
            video.src = videoUrl;
            player.classList.add('active');
            video.play();
        }

        function closeFullscreenPlayer() {
            const player = document.getElementById('fullscreenPlayer');
            const video = document.getElementById('fullscreenVideo');
            
            video.pause();
            video.src = '';
            player.classList.remove('active');
        }

        // Инициализация Telegram Web App
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    currentUser = {
                        id: tg.initDataUnsafe.user.id,
                        name: tg.initDataUnsafe.user.first_name || 'Танцор'
                    };
                    
                    document.getElementById('userName').textContent = currentUser.name;
                    document.getElementById('userAvatar').textContent = currentUser.name.charAt(0).toUpperCase();
                    
                    // Проверка админа
                    const adminButton = document.getElementById('adminButton');
                    if (currentUser.id === YOUR_TELEGRAM_ID) {
                        adminButton.classList.remove('hidden');
                    } else {
                        adminButton.style.display = 'none';
                    }
                }
            } else {
                // Режим отладки
                currentUser = {
                    id: YOUR_TELEGRAM_ID, // Для теста
                    name: 'Админ'
                };
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userAvatar').textContent = 'А';
                document.getElementById('adminButton').classList.remove('hidden');
            }
        }

        // Загрузка клипов
        function loadClips() {
            const saved = localStorage.getItem('proClips');
            if (saved) {
                clips = JSON.parse(saved);
            } else {
                // Тестовые данные с рабочей ссылкой на видео
                clips = [
                    {
                        id: '1',
                        title: 'Мастер-класс по хип-хопу',
                        description: 'Урок от Алексея. Изучаем базовые движения и крутые связки для начинающих',
                        videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4',
                        likes: 156,
                        likedBy: [],
                        comments: [
                            {
                                id: 'c1',
                                author: 'Анна',
                                text: 'Очень крутой урок! Спасибо!',
                                date: new Date().toISOString()
                            }
                        ],
                        date: new Date().toISOString()
                    },
                    {
                        id: '2',
                        title: 'Contemporary. Эмоции в танце',
                        description: 'Мастер-класс от Елены. Работа с эмоциями и пространством',
                        videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4',
                        likes: 234,
                        likedBy: [],
                        comments: [],
                        date: new Date().toISOString()
                    },
                    {
                        id: '3',
                        title: 'Bollywood Dance',
                        description: 'Яркий и энергичный урок по индийским танцам',
                        videoUrl: 'https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4',
                        likes: 89,
                        likedBy: [],
                        comments: [],
                        date: new Date().toISOString()
                    }
                ];
            }
            renderClips();
        }

        // Сохранение
        function saveClips() {
            localStorage.setItem('proClips', JSON.stringify(clips));
        }

        // Рендер клипов
        function renderClips() {
            const container = document.getElementById('clipsContainer');
            container.innerHTML = '';

            clips.sort((a, b) => new Date(b.date) - new Date(a.date)).forEach((clip, index) => {
                const card = createClipCard(clip);
                card.style.animationDelay = `${index * 0.1}s`;
                container.appendChild(card);
            });
        }

        // Создание карточки
        function createClipCard(clip) {
            const div = document.createElement('div');
            div.className = 'clip-card';
            div.id = `clip-${clip.id}`;

            const liked = clip.likedBy?.includes(currentUser.id) || false;

            div.innerHTML = `
                <div class="video-wrapper" onclick="openFullscreenPlayer('${clip.videoUrl}')">
                    <video src="${clip.videoUrl}" loop muted></video>
                    <div class="video-overlay">
                        <div class="play-button">▶</div>
                    </div>
                    <div class="video-controls" onclick="event.stopPropagation()">
                        <button class="control-btn" onclick="event.stopPropagation(); playPauseVideo('${clip.id}')">⏯</button>
                        <button class="control-btn" onclick="event.stopPropagation(); toggleMute('${clip.id}')">🔊</button>
                    </div>
                </div>
                
                <div class="clip-content">
                    <h3 class="clip-title">${clip.title}</h3>
                    <p class="clip-description">${clip.description}</p>
                    
                    <div class="clip-meta">
                        <div class="meta-item">
                            <span>📅</span>
                            ${new Date(clip.date).toLocaleDateString()}
                        </div>
                        <div class="meta-item">
                            <span>💬</span>
                            ${clip.comments?.length || 0}
                        </div>
                    </div>
                    
                    <div class="clip-actions">
                        <button class="action-btn ${liked ? 'liked' : ''}" onclick="handleLike('${clip.id}')">
                            <span>❤️</span>
                            <span id="likes-${clip.id}">${clip.likes || 0}</span>
                        </button>
                        
                        <button class="action-btn" onclick="toggleComments('${clip.id}')">
                            💬 Комментировать
                        </button>
                        
                        <button class="share-btn" onclick="shareClip('${clip.id}')">
                            📤
                        </button>
                    </div>
                </div>
                
                <div class="comments-section" id="comments-${clip.id}" style="display: none;">
                    <div class="comment-input-wrapper">
                        <input type="text" class="comment-input" id="comment-input-${clip.id}" placeholder="Ваш комментарий...">
                        <button class="comment-send" onclick="addComment('${clip.id}')">➤</button>
                    </div>
                    
                    <div class="comments-list" id="comments-list-${clip.id}">
                        ${renderComments(clip.comments || [])}
                    </div>
                </div>
            `;

            // Добавляем hover для видео
            const video = div.querySelector('video');
            div.addEventListener('mouseenter', () => video.play());
            div.addEventListener('mouseleave', () => {
                video.pause();
                video.currentTime = 0;
            });

            return div;
        }

        // Управление видео
        function playPauseVideo(clipId) {
            const video = document.querySelector(`#clip-${clipId} video`);
            if (video) {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }
        }

        function toggleMute(clipId) {
            const video = document.querySelector(`#clip-${clipId} video`);
            if (video) {
                video.muted = !video.muted;
                const btn = document.querySelector(`#clip-${clipId} .control-btn:last-child`);
                if (btn) {
                    btn.textContent = video.muted ? '🔇' : '🔊';
                }
            }
        }

        // Рендер комментариев
        function renderComments(comments) {
            if (!comments.length) {
                return '<p style="color: #8a6cb8; text-align: center; padding: 20px;">Пока нет комментариев</p>';
            }
            
            return comments.map(comment => `
                <div class="comment">
                    <div class="comment-author">${comment.author}</div>
                    <div class="comment-text">${comment.text}</div>
                    <div class="comment-time">${new Date(comment.date).toLocaleString()}</div>
                </div>
            `).join('');
        }

        // Лайки
        window.handleLike = function(clipId) {
            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (!clip.likedBy) clip.likedBy = [];
            if (!clip.likes) clip.likes = 0;

            const liked = clip.likedBy.includes(currentUser.id);
            
            if (liked) {
                clip.likedBy = clip.likedBy.filter(id => id !== currentUser.id);
                clip.likes--;
            } else {
                clip.likedBy.push(currentUser.id);
                clip.likes++;
            }

            saveClips();
            
            const likesSpan = document.getElementById(`likes-${clipId}`);
            if (likesSpan) likesSpan.textContent = clip.likes;

            const likeBtn = document.querySelector(`#clip-${clipId} .action-btn:first-child`);
            if (likeBtn) {
                if (!liked) {
                    likeBtn.classList.add('liked');
                } else {
                    likeBtn.classList.remove('liked');
                }
            }

            showToast(liked ? '👎 Лайк убран' : '❤️ Лайк поставлен!');
        };

        // Комментарии
        window.addComment = function(clipId) {
            const input = document.getElementById(`comment-input-${clipId}`);
            const text = input.value.trim();
            
            if (!text) {
                showToast('❌ Напишите комментарий');
                return;
            }

            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (!clip.comments) clip.comments = [];

            const comment = {
                id: 'c' + Date.now(),
                author: currentUser.name,
                text: text,
                date: new Date().toISOString()
            };

            clip.comments.push(comment);
            saveClips();

            const commentsList = document.getElementById(`comments-list-${clipId}`);
            commentsList.innerHTML = renderComments(clip.comments);

            input.value = '';
            showToast('💬 Комментарий добавлен');

            const commentsSection = document.getElementById(`comments-${clipId}`);
            if (commentsSection.style.display === 'none') {
                commentsSection.style.display = 'block';
            }
        };

        window.toggleComments = function(clipId) {
            const commentsDiv = document.getElementById(`comments-${clipId}`);
            if (commentsDiv) {
                commentsDiv.style.display = commentsDiv.style.display === 'none' ? 'block' : 'none';
            }
        };

        // Шаринг
        window.shareClip = function(clipId) {
            const clip = clips.find(c => c.id === clipId);
            if (!clip) return;

            if (navigator.share) {
                navigator.share({
                    title: clip.title,
                    text: clip.description,
                    url: window.location.href
                }).catch(() => {
                    copyToClipboard(window.location.href);
                });
            } else {
                copyToClipboard(window.location.href);
            }
        };

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast('🔗 Ссылка скопирована');
            });
        }

        // Админ панель
        window.toggleAdminPanel = function() {
            if (currentUser.id !== YOUR_TELEGRAM_ID) {
                showToast('⛔ Доступ запрещен');
                return;
            }

            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        };

        // Добавление клипа
        document.getElementById('addClipForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (currentUser.id !== YOUR_TELEGRAM_ID) {
                showToast('⛔ Только администратор может добавлять клипы');
                return;
            }

            const title = document.getElementById('clipTitle').value;
            const description = document.getElementById('clipDescription').value;
            const videoFile = document.getElementById('videoFile').files[0];

            if (!videoFile) {
                showToast('❌ Выберите видео');
                return;
            }

            showToast('⏳ Загрузка...', 5000);

            try {
                const videoUrl = URL.createObjectURL(videoFile);

                const newClip = {
                    id: 'clip_' + Date.now(),
                    title: title,
                    description: description,
                    videoUrl: videoUrl,
                    likes: 0,
                    likedBy: [],
                    comments: [],
                    date: new Date().toISOString()
                };

                clips.unshift(newClip);
                saveClips();
                
                document.getElementById('addClipForm').reset();
                document.getElementById('fileName').textContent = '';
                document.getElementById('uploadText').textContent = 'Нажмите, чтобы выбрать видео';
                
                renderClips();
                showToast('✅ Клип опубликован!');
                
                document.getElementById('adminPanel').style.display = 'none';

            } catch (error) {
                console.error(error);
                showToast('❌ Ошибка загрузки');
            }
        });

        // Отображение имени файла
        document.getElementById('videoFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('fileName').textContent = `📹 ${file.name}`;
                document.getElementById('uploadText').textContent = 'Файл выбран:';
            }
        });

        // Уведомления
        function showToast(text, duration = 3000) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = text;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        // Градиентный фон
        function initGradient() {
            const canvas = document.getElementById('gradient-canvas');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            resize();
            window.addEventListener('resize', resize);
            
            let time = 0;
            
            function draw() {
                time += 0.002;
                
                const gradient = ctx.createLinearGradient(
                    Math.sin(time) * 100 + canvas.width/2,
                    Math.cos(time * 1.3) * 100 + canvas.height/2,
                    Math.sin(time + Math.PI) * 100 + canvas.width/2,
                    Math.cos(time * 1.3 + Math.PI) * 100 + canvas.height/2
                );
                
                gradient.addColorStop(0, '#030104');
                gradient.addColorStop(0.3, '#1a0b2e');
                gradient.addColorStop(0.6, '#2d1a44');
                gradient.addColorStop(1, '#030104');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                requestAnimationFrame(draw);
            }
            
            draw();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initTelegram();
            loadClips();
            initGradient();
            
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 2000);
        });

        // Закрытие по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeFullscreenPlayer();
            }
        });
    </script>
</body>
</html>
