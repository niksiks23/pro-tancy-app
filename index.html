<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>РИТМ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #9d4edd;
            --primary-dark: #7b2cbf;
            --secondary: #00bbf9;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 10, 30, 0.7);
            --glass-border: rgba(157, 78, 221, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --cancel-color: #ff4b4b;
            --admin-badge: #ff006e;
            --success: #00bbf9;
            --goal-1: #9d4edd;
            --goal-2: #00bbf9;
            --goal-3: #ff9f1c;
            --celebration: #ffd700;
            --notification: #ff9f1c;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1025 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .replay-onboarding {
            position: absolute;
            top: 12px;
            right: 15px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(157,78,221,0.4);
            border: 2px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
            font-size: 22px;
            animation: pulseButton 2s infinite;
        }

        .replay-onboarding:active {
            transform: scale(0.9);
        }

        @keyframes pulseButton {
            0%, 100% { box-shadow: 0 5px 15px rgba(157,78,221,0.4); transform: scale(1); }
            50% { box-shadow: 0 10px 25px rgba(157,78,221,0.8); transform: scale(1.05); }
        }

        .onboarding-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1025 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .slides-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .slides-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .slide {
            flex: 0 0 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px 20px;
            position: relative;
            overflow-y: auto;
        }

        .slide-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide-bg-circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(157,78,221,0.2) 0%, transparent 70%);
            animation: float 20s infinite ease-in-out;
        }

        .slide-bg-circle:nth-child(1) {
            width: 250px;
            height: 250px;
            top: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(157,78,221,0.15) 0%, transparent 70%);
            animation-delay: 0s;
        }

        .slide-bg-circle:nth-child(2) {
            width: 200px;
            height: 200px;
            bottom: -80px;
            left: -80px;
            background: radial-gradient(circle, rgba(0,187,249,0.15) 0%, transparent 70%);
            animation-delay: -5s;
        }

        .slide-bg-circle:nth-child(3) {
            width: 150px;
            height: 150px;
            top: 40%;
            left: 30%;
            background: radial-gradient(circle, rgba(255,75,75,0.1) 0%, transparent 70%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(15px, -15px) scale(1.05); }
            50% { transform: translate(-15px, 15px) scale(0.95); }
            75% { transform: translate(15px, 15px) scale(1.02); }
        }

        .slide-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 40px;
            box-shadow: 0 15px 25px rgba(157,78,221,0.3);
            animation: pulseGlow 2s infinite;
            position: relative;
        }

        .slide-icon::after {
            content: '';
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            opacity: 0.3;
            z-index: -1;
            animation: pulseRing 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 15px 30px rgba(157,78,221,0.3); }
            50% { box-shadow: 0 25px 45px rgba(157,78,221,0.6); }
        }

        @keyframes pulseRing {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.15); opacity: 0.1; }
        }

        .slide-title {
            font-size: 26px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            padding: 0 10px;
        }

        .slide-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            text-align: center;
            max-width: 260px;
            margin-bottom: 20px;
            line-height: 1.4;
            padding: 0 15px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin: 15px auto;
            padding: 0 15px;
        }

        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 16px 8px;
            text-align: center;
            backdrop-filter: blur(5px);
            animation: cardAppear 0.5s ease forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        .feature-card:nth-child(1) { animation-delay: 0.1s; }
        .feature-card:nth-child(2) { animation-delay: 0.2s; }
        .feature-card:nth-child(3) { animation-delay: 0.3s; }
        .feature-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 10px;
            color: var(--text-muted);
        }

        .coming-soon-list {
            width: 100%;
            max-width: 320px;
            margin: 15px auto;
            padding: 0 15px;
        }

        .coming-soon-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            margin-bottom: 10px;
            backdrop-filter: blur(5px);
            transform: translateX(-20px);
            opacity: 0;
            animation: slideRight 0.5s ease forwards;
        }

        .coming-soon-item:nth-child(1) { animation-delay: 0.1s; }
        .coming-soon-item:nth-child(2) { animation-delay: 0.2s; }
        .coming-soon-item:nth-child(3) { animation-delay: 0.3s; }

        @keyframes slideRight {
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .coming-soon-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, rgba(157,78,221,0.2), rgba(0,187,249,0.2));
            border-radius: 21px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .coming-soon-text {
            flex: 1;
        }

        .coming-soon-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .coming-soon-desc {
            font-size: 11px;
            color: var(--text-muted);
        }

        .final-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        .final-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(157,78,221,0.5);
            animation: rotateIn 0.8s ease;
        }

        @keyframes rotateIn {
            from {
                transform: rotate(-180deg) scale(0);
                opacity: 0;
            }
            to {
                transform: rotate(0) scale(1);
                opacity: 1;
            }
        }

        .final-title {
            font-size: 24px;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: 1px;
            max-width: 280px;
        }

        .final-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
            max-width: 250px;
            line-height: 1.5;
        }

        .start-button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 700;
            padding: 15px 45px;
            border-radius: 35px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(157,78,221,0.4);
            position: relative;
            overflow: hidden;
            animation: pulse 2s infinite;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .start-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            100% {
                left: 100%;
            }
        }

        .start-button:active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .slide-nav {
            position: absolute;
            bottom: 90px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 30;
            padding: 0 20px;
        }

        .nav-button {
            width: 50px;
            height: 50px;
            background: var(--bg-card);
            border: 2px solid var(--primary);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .nav-button:active {
            transform: scale(0.9);
            background: var(--primary);
        }

        .nav-button svg {
            width: 28px;
            height: 28px;
            color: var(--primary);
            transition: all 0.2s ease;
        }

        .nav-button:active svg {
            color: white;
        }

        .nav-button.disabled {
            opacity: 0.3;
            pointer-events: none;
            border-color: var(--text-muted);
        }

        .slide-indicators {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px 0 20px;
            z-index: 10;
        }

        .indicator {
            width: 8px;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .indicator.active {
            width: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .onboarding-progress {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
            background: var(--bg-card);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
        }

        .close-onboarding {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 20px;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }

        .close-onboarding:active {
            background: var(--cancel-color);
            color: white;
            transform: scale(0.9);
        }

        .app-header {
            padding: 18px 20px 10px;
            text-align: center;
            background: linear-gradient(180deg, rgba(26, 16, 37, 0.95) 0%, rgba(26, 16, 37, 0.8) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            position: relative;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .app-header h1:active {
            transform: scale(0.95);
            background: rgba(157, 78, 221, 0.2);
            -webkit-background-clip: text;
        }

        .app-header p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .admin-badge {
            position: absolute;
            top: 10px;
            right: 65px;
            background: var(--admin-badge);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-badge.active {
            opacity: 1;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 12px;
            background: rgba(26, 16, 37, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            gap: 5px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 20px;
            flex: 1;
            max-width: 80px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            transition: all 0.2s ease;
        }

        .nav-item.active svg {
            color: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .clip-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: transform 0.15s ease;
        }

        .clip-card:active {
            transform: scale(0.97);
        }

        .clip-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(0, 187, 249, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clip-thumbnail svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
            opacity: 0.8;
        }

        .clip-info {
            padding: 12px;
        }

        .clip-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip-description {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip-stats {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 18px;
        }

        .modal-content {
            width: 100%;
            max-width: 360px;
            max-height: 80vh;
            background: #1a1025;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
        }

        .goal-modal-content {
            width: 100%;
            max-width: 340px;
            background: #1a1025;
            border-radius: 32px;
            padding: 28px 24px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.4);
            position: relative;
            overflow: hidden;
        }

        .goal-modal-content::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(157,78,221,0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .goal-modal-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .goal-input {
            width: 100%;
            padding: 18px 20px;
            margin: 12px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            color: white;
            font-size: 16px;
            text-align: left;
            transition: all 0.3s ease;
        }

        .goal-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(157, 78, 221, 0.1);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.3);
        }

        .goal-input::placeholder {
            color: var(--text-muted);
            font-size: 14px;
        }

        .goal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .goal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 24px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .goal-btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .goal-btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.4);
        }

        .goal-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            border: 1px solid var(--glass-border);
        }

        .goal-btn-secondary:active {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(0.95);
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: black;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .video-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-placeholder svg {
            width: 48px;
            height: 48px;
            color: white;
        }

        .video-placeholder video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .reactions-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 18px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 40px;
        }

        .reaction-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>
        const STORAGE_KEYS = {
            CLIPS: 'pro_dance_clips',
            CANCELLED_TRAININGS: 'pro_dance_cancelled',
            RULES: 'pro_dance_rules',
            PROFILE: 'pro_dance_profile',
            ONBOARDING_SHOWN: 'pro_dance_onboarding_shown',
            USER_GROUP: 'pro_dance_user_group',
            NOTIFICATIONS: 'pro_dance_notifications'
        };

        const WEEKLY_SCHEDULE = {
            1: [
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Калланетика' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Латина (новички)' }
            ],
            2: [
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (7-9 лет)' }
            ],
            3: [
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Индивидуальные' }
            ],
            4: [
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '20:00', name: 'Бачата (новички)' }
            ],
            5: [
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Индивидуальные' }
            ],
            6: [
                { time: '9:00', name: 'Калланетика' },
                { time: '10:00', name: 'Бачата + Латина' },
                { time: '11:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '12:00', name: 'Индивидуальные' }
            ],
            7: []
        };

        const ALL_GROUPS = [
            'Ритмика (3-5 лет)',
            'Бальные танцы (5-6 лет)',
            'Бальные танцы (7-9 лет)',
            'Бальные танцы (9-12 лет)',
            'Латина (новички)',
            'Латина (старшая)',
            'Калланетика',
            'Бачата (новички)',
            'Индивидуальные'
        ];

        const defaultData = {
            clips: [],
            cancelledTrainings: {},
            rules: '1. Приходить за 15 минут\n2. Сменная обувь\n3. Вода с собой\n4. Предупреждать о пропусках',
            profile: {
                goals: []
            },
            userGroup: '',
            notifications: []
        };

        let appData = null;
        let currentPage = 'schedule';
        let selectedDate = new Date().toISOString().split('T')[0];
        let currentMonth = new Date();
        let isAdmin = false;
        let tgUser = 'Танцор';
        let tg = null;
        let cloudStorage = null;

        try {
            if (window.Telegram && Telegram.WebApp) {
                tg = Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                tg.setHeaderColor('#1a1025');
                tg.setBackgroundColor('#0f0f1a');
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    tgUser = user.first_name || user.username || 'Танцор';
                }
                
                cloudStorage = tg.CloudStorage;
                
                console.log('Telegram WebApp инициализирован');
            }
        } catch (e) {
            console.log('Не удалось инициализировать Telegram:', e);
        }

        async function loadData() {
            return new Promise(async (resolve) => {
                try {
                    if (cloudStorage) {
                        const keys = Object.values(STORAGE_KEYS);
                        const loadedData = {};
                        
                        for (const key of keys) {
                            try {
                                const value = await new Promise((resolve) => {
                                    cloudStorage.getItem(key, (error, value) => {
                                        if (error) {
                                            console.log(`Ошибка загрузки ${key}:`, error);
                                            resolve(null);
                                        } else {
                                            resolve(value);
                                        }
                                    });
                                });
                                
                                if (value) {
                                    try {
                                        loadedData[key] = JSON.parse(value);
                                    } catch {
                                        loadedData[key] = value;
                                    }
                                }
                            } catch (e) {
                                console.log(`Ошибка при загрузке ${key}:`, e);
                            }
                        }
                        
                        appData = {
                            clips: loadedData[STORAGE_KEYS.CLIPS] || defaultData.clips,
                            cancelledTrainings: loadedData[STORAGE_KEYS.CANCELLED_TRAININGS] || defaultData.cancelledTrainings,
                            rules: loadedData[STORAGE_KEYS.RULES] || defaultData.rules,
                            profile: loadedData[STORAGE_KEYS.PROFILE] || defaultData.profile,
                            userGroup: loadedData[STORAGE_KEYS.USER_GROUP] || defaultData.userGroup,
                            notifications: loadedData[STORAGE_KEYS.NOTIFICATIONS] || defaultData.notifications
                        };
                        
                        console.log('Данные загружены из облака Telegram');
                        resolve();
                    } else {
                        const savedClips = localStorage.getItem(STORAGE_KEYS.CLIPS);
                        const savedCancelled = localStorage.getItem(STORAGE_KEYS.CANCELLED_TRAININGS);
                        const savedRules = localStorage.getItem(STORAGE_KEYS.RULES);
                        const savedProfile = localStorage.getItem(STORAGE_KEYS.PROFILE);
                        const savedUserGroup = localStorage.getItem(STORAGE_KEYS.USER_GROUP);
                        const savedNotifications = localStorage.getItem(STORAGE_KEYS.NOTIFICATIONS);

                        appData = {
                            clips: savedClips ? JSON.parse(savedClips) : defaultData.clips,
                            cancelledTrainings: savedCancelled ? JSON.parse(savedCancelled) : defaultData.cancelledTrainings,
                            rules: savedRules || defaultData.rules,
                            profile: savedProfile ? JSON.parse(savedProfile) : defaultData.profile,
                            userGroup: savedUserGroup || defaultData.userGroup,
                            notifications: savedNotifications ? JSON.parse(savedNotifications) : defaultData.notifications
                        };
                        
                        console.log('Данные загружены из localStorage');
                        resolve();
                    }
                } catch (e) {
                    console.error('Ошибка загрузки данных:', e);
                    appData = defaultData;
                    resolve();
                }
            });
        }

        async function saveData() {
            try {
                if (cloudStorage) {
                    const savePromises = [];
                    
                    savePromises.push(new Promise((resolve) => {
                        cloudStorage.setItem(STORAGE_KEYS.CLIPS, JSON.stringify(appData.clips), (error) => {
                            if (error) console.error('Ошибка сохранения clips:', error);
                            resolve();
                        });
                    }));
                    
                    savePromises.push(new Promise((resolve) => {
                        cloudStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings), (error) => {
                            if (error) console.error('Ошибка сохранения cancelledTrainings:', error);
                            resolve();
                        });
                    }));
                    
                    savePromises.push(new Promise((resolve) => {
                        cloudStorage.setItem(STORAGE_KEYS.RULES, appData.rules, (error) => {
                            if (error) console.error('Ошибка сохранения rules:', error);
                            resolve();
                        });
                    }));
                    
                    savePromises.push(new Promise((resolve) => {
                        cloudStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(appData.profile), (error) => {
                            if (error) console.error('Ошибка сохранения profile:', error);
                            resolve();
                        });
                    }));
                    
                    savePromises.push(new Promise((resolve) => {
                        cloudStorage.setItem(STORAGE_KEYS.USER_GROUP, appData.userGroup, (error) => {
                            if (error) console.error('Ошибка сохранения userGroup:', error);
                            resolve();
                        });
                    }));
                    
                    savePromises.push(new Promise((resolve) => {
                        cloudStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(appData.notifications), (error) => {
                            if (error) console.error('Ошибка сохранения notifications:', error);
                            resolve();
                        });
                    }));
                    
                    await Promise.all(savePromises);
                    console.log('Данные сохранены в облако Telegram');
                } else {
                    localStorage.setItem(STORAGE_KEYS.CLIPS, JSON.stringify(appData.clips));
                    localStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings));
                    localStorage.setItem(STORAGE_KEYS.RULES, appData.rules);
                    localStorage.setItem(STORAGE_KEYS.PROFILE, JSON.stringify(appData.profile));
                    localStorage.setItem(STORAGE_KEYS.USER_GROUP, appData.userGroup);
                    localStorage.setItem(STORAGE_KEYS.NOTIFICATIONS, JSON.stringify(appData.notifications));
                    
                    console.log('Данные сохранены в localStorage');
                }
                
                // Обновляем список клипов в админ-панели если она открыта
                if (isAdmin && document.getElementById('adminPanel').classList.contains('active')) {
                    updateAdminClipList();
                }
            } catch (e) {
                console.error('Ошибка сохранения данных:', e);
                showToast('Ошибка сохранения данных');
            }
        }

        function hapticFeedback(type = 'medium') {
            if (tg && tg.HapticFeedback) {
                try {
                    if (type === 'success') {
                        tg.HapticFeedback.notificationOccurred('success');
                    } else if (type === 'error') {
                        tg.HapticFeedback.notificationOccurred('error');
                    } else if (type === 'warning') {
                        tg.HapticFeedback.notificationOccurred('warning');
                    } else {
                        tg.HapticFeedback.impactOccurred(type);
                    }
                } catch (e) {
                    console.log('Haptic feedback error:', e);
                }
            }
        }

        function sendTelegramNotification(message) {
            if (tg) {
                try {
                    tg.showPopup({
                        title: 'РИТМ - Напоминание',
                        message: message,
                        buttons: [{type: 'close', text: 'Ок'}]
                    });
                    
                    showToast(message);
                    hapticFeedback('success');
                } catch (e) {
                    console.log('Telegram popup error:', e);
                }
            } else {
                showNotification('РИТМ', message);
            }
        }

        function checkReminders() {
            if (!appData || !appData.notifications || appData.notifications.length === 0) return;
            
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            
            appData.notifications.forEach(notif => {
                if (!notif.enabled) return;
                
                const [hours, minutes] = notif.time.split(':').map(Number);
                const notificationTime = hours * 60 + minutes;
                
                if (Math.abs(currentTime - notificationTime) <= 1) {
                    const todayStr = now.toISOString().split('T')[0];
                    const todayTrainings = getTrainingsForDate(todayStr);
                    const userTraining = todayTrainings.find(t => t.name === appData.userGroup);
                    
                    if (userTraining && !userTraining.isCancelled) {
                        const message = `⏰ Напоминание: сегодня в ${userTraining.time} - ${userTraining.name}`;
                        sendTelegramNotification(message);
                    }
                }
            });
        }

        setInterval(checkReminders, 60000);

        function showNotification(title, body) {
            if (!('Notification' in window)) return;
            
            if (Notification.permission === 'granted') {
                new Notification(title, {
                    body: body,
                    icon: 'https://cdn-icons-png.flaticon.com/512/3176/3176366.png',
                    silent: false
                });
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            
            const onboardingShown = localStorage.getItem(STORAGE_KEYS.ONBOARDING_SHOWN);
            
            if (!onboardingShown) {
                setTimeout(() => {
                    showOnboarding();
                }, 300);
                localStorage.setItem(STORAGE_KEYS.ONBOARDING_SHOWN, 'true');
            }
            
            renderPage();
            initAdminTrigger();
            updateAdminBadge();
            
            if (!tg && 'Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        });

        function updateAdminClipList() {
            const clipListDiv = document.getElementById('adminClipList');
            if (!clipListDiv || !appData) return;
            
            if (appData.clips.length === 0) {
                clipListDiv.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted);">Нет клипов</div>';
                return;
            }
            
            let html = '';
            appData.clips.forEach(clip => {
                html += `
                    <div class="admin-clip-item">
                        <div class="admin-clip-info">
                            <div class="admin-clip-title">${clip.title}</div>
                            <div class="admin-clip-desc">${clip.description}</div>
                        </div>
                        <div class="admin-clip-delete" onclick="deleteClip(${clip.id})">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                            </svg>
                        </div>
                    </div>
                `;
            });
            
            clipListDiv.innerHTML = html;
        }

        window.deleteClip = async function(clipId) {
            if (!isAdmin) return;
            
            hapticFeedback('medium');
            
            if (confirm('Удалить этот клип?')) {
                const clipIndex = appData.clips.findIndex(c => c.id === clipId);
                if (clipIndex !== -1) {
                    const clipTitle = appData.clips[clipIndex].title;
                    appData.clips.splice(clipIndex, 1);
                    
                    await saveData();
                    
                    if (currentPage === 'clips') {
                        renderPage();
                    }
                    
                    updateAdminClipList();
                    
                    showToast(`Клип "${clipTitle}" удален`);
                    
                    if (tg) {
                        tg.showPopup({
                            title: 'Клип удален',
                            message: `Клип "${clipTitle}" удален у всех пользователей`,
                            buttons: [{type: 'close', text: 'Ок'}]
                        });
                    }
                }
            }
        };

        window.showOnboarding = function() {
            if (document.getElementById('onboarding')) return;
            
            hapticFeedback('medium');
            
            const onboarding = document.createElement('div');
            onboarding.className = 'onboarding-screen';

            const slides = [
                {
                    icon: '🎯',

                    type: 'welcome'
                },
                {
                    icon: '📅',
                    title: 'Расписание',
                    subtitle: 'Актуальное расписание тренировок с отметками об отменах',
                    features: [
                        { icon: '✅', title: 'Отмена занятий', desc: 'Всегда будь в курсе изменений' },
                        { icon: '🥰', title: 'Удобство', desc: 'Все расписание в одном месте' }
                    ]
                },
                {
                    icon: '🎥',
                    title: 'Клипы и реакции',
                    subtitle: 'Смотри видео, ставь лайки и общайся в комментариях',
                    features: [
                        { icon: '❤️', title: 'Реакции', desc: 'Выражай свои эмоции' },
                        { icon: '💬', title: 'Комментарии', desc: 'Делись впечатлениями' }
                    ]
                },
                {
                    icon: '💪',
                    title: 'Направления',
                    subtitle: 'Все стили танцев в одном месте',
                    features: [
                        { icon: '💃', title: 'Бальные танцы', desc: 'Классика и современность' },
                        { icon: '🔥', title: 'Латина', desc: 'Страсть и энергия' },
                        { icon: '🧘', title: 'Калланетика', desc: 'Здоровье и гибкость' },
                        { icon: '🎵', title: 'Ритмика', desc: 'Развитие с детства' }
                    ]
                },
                {
                    icon: '🎯',
                    title: 'Цели и прогресс',
                    subtitle: 'Скоро вы сможете ставить цели и отслеживать свой прогресс',
                    comingSoon: [
                        { icon: '⚖️', title: 'Трекер веса', desc: 'Графики динамики и статистика' },

                },
                {

        window.changeSlide = function(delta) {
            hapticFeedback('light');
            const newIndex = window.currentSlideIndex + delta;
            if (newIndex >= 0 && newIndex < window.totalSlides) {
                goToSlide(newIndex);
            }
        };

        window.goToSlide = function(index) {
            const wrapper = document.getElementById('slidesWrapper');
            const indicators = document.querySelectorAll('.indicator');
            const progress = document.getElementById('onboardingProgress');
            
            if (!wrapper || !indicators.length || !progress) return;
            
            window.currentSlideIndex = index;
            
            wrapper.style.transform = `translateX(-${index * 100}%)`;
            
            indicators.forEach((ind, i) => {
                if (i === index) {
                    ind.classList.add('active');
                } else {
                    ind.classList.remove('active');
                }
            });
            
            progress.textContent = `${index + 1} / ${window.totalSlides}`;
            
            updateNavButtons();
        };

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevSlide');
            const nextBtn = document.getElementById('nextSlide');
            
            if (prevBtn && nextBtn) {
                if (window.currentSlideIndex === 0) {
                    prevBtn.classList.add('disabled');
                } else {
                    prevBtn.classList.remove('disabled');
                }
                
                if (window.currentSlideIndex === window.totalSlides - 1) {
                    nextBtn.classList.add('disabled');
                } else {
                    nextBtn.classList.remove('disabled');
                }
            }
        }

        window.closeOnboarding = function() {
            hapticFeedback('success');
            const onboarding = document.getElementById('onboarding');
            if (onboarding) {
                onboarding.style.animation = 'fadeOut 0.3s ease forwards';
                setTimeout(() => {
                    onboarding.remove();
                }, 300);
            }
        };

        document.addEventListener('touchstart', handleTouchStart, { passive: true });
        document.addEventListener('touchend', handleTouchEnd, { passive: true });

        let touchStartX = 0;
        let touchEndX = 0;

        function handleTouchStart(e) {
            touchStartX = e.changedTouches[0].screenX;
        }

        function handleTouchEnd(e) {
            const onboarding = document.getElementById('onboarding');
            if (!onboarding) return;
            
            touchEndX = e.changedTouches[0].screenX;
            
            if (touchStartX - touchEndX > 50) {
                changeSlide(1);
            } else if (touchEndX - touchStartX > 50) {
                changeSlide(-1);
            }
        }

        function getTrainingsForDate(dateStr) {
            if (!appData) return [];
            
            const date = new Date(dateStr);
            const dayOfWeek = date.getDay() === 0 ? 7 : date.getDay();
            
            const weeklyTrainings = WEEKLY_SCHEDULE[dayOfWeek] || [];
            
            const cancelledForDate = appData.cancelledTrainings[dateStr] || [];
            
            return weeklyTrainings.map(training => {
                const trainingKey = `${training.time} ${training.name}`;
                return {
                    ...training,
                    isCancelled: cancelledForDate.includes(trainingKey)
                };
            });
        }

        function renderSchedule(container) {
            if (!appData) return;
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            const weekdays = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            
            let html = `

                    <div class="calendar-header">

                    <div class="calendar-grid">
            `;
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendar-day other-month"></div>';
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const trainings = getTrainingsForDate(dateStr);
                const activeTrainings = trainings.filter(t => !t.isCancelled);
                const hasTraining = activeTrainings.length > 0;
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">

            const trainings = getTrainingsForDate(selectedDate);

                        <label style="color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; display: block;">Время напоминания</label>
                        <input type="time" class="goal-input" id="notificationTime" value="18:00" style="text-align: center;">
                    </div>
                    
                    <div style="margin-bottom: 16px;">
                        <label style="color: var(--text-secondary); font-size: 14px; margin-bottom: 8px; display: block;">Для группы</label>
                        <div style="background: rgba(255,255,255,0.05); padding: 16px; border-radius: 18px; color: var(--primary); font-weight: 600; text-align: center;">
                            ${appData.userGroup}
                        </div>
                    </div>
                    
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveNotification()">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => {
                document.getElementById('notificationTime').focus();
            }, 100);
        };

        window.saveNotification = function() {
            if (!appData.userGroup) {
                showToast('Сначала выберите группу');
                closeModal();
                return;
            }
            
            const timeInput = document.getElementById('notificationTime');
            if (!timeInput.value) {
                showToast('Выберите время');
                return;
            }
            
            if (appData.notifications.length >= 5) {
                showToast('Максимум 5 уведомлений');
                return;
            }
            
            const exists = appData.notifications.some(n => n.time === timeInput.value);
            if (exists) {
                showToast('На это время уже есть напоминание');
                return;
            }
            
            appData.notifications.push({
                id: Date.now(),
                time: timeInput.value,
                group: appData.userGroup,
                enabled: true,
                created: new Date().toISOString()
            });
            
            saveData().then(() => {
                hapticFeedback('success');
                closeModal();
                renderProfile(document.getElementById('content'));
                showToast(`Напоминание на ${timeInput.value} добавлено`);
            });
        };

        window.deleteNotification = function(id) {
            hapticFeedback('light');
            appData.notifications = appData.notifications.filter(n => n.id !== id);
            saveData().then(() => {
                renderProfile(document.getElementById('content'));
                showToast('Напоминание удалено');
            });
        };

        window.openAddGoalModal = function() {
            hapticFeedback('medium');
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'addGoalModal';
            modal.innerHTML = `
                <div class="goal-modal-content">
                    <div class="goal-modal-title">Новая цель</div>
                    <input type="text" class="goal-input" id="goalTextInput" placeholder="Например: Похудеть на 5 кг" autofocus>
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="saveGoal()">Добавить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => {
                document.getElementById('goalTextInput').focus();
            }, 100);
        };

        window.saveGoal = function() {
            const input = document.getElementById('goalTextInput');
            if (input && input.value.trim()) {
                if (!appData.profile.goals) {
                    appData.profile.goals = [];
                }
                appData.profile.goals.push({ 
                    text: input.value.trim(), 
                    progress: 0 
                });
                saveData().then(() => {
                    hapticFeedback('success');
                    closeModal();
                    renderPage();
                    showToast('Цель добавлена!');
                });
            } else {
                showToast('Введите описание цели');
            }
        };

        window.editGoalProgress = function(index) {
            hapticFeedback('light');
            const goal = appData.profile.goals[index];
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'editGoalModal';
            modal.innerHTML = `
                <div class="goal-modal-content">
                    <div class="goal-modal-title">📈 Прогресс</div>
                    <div style="text-align: center; margin-bottom: 16px; color: var(--text-secondary); font-size: 14px;">${goal.text}</div>
                    <input type="number" class="goal-input" id="goalProgressInput" value="${goal.progress}" min="0" max="100" placeholder="0-100">
                    <div class="goal-buttons">
                        <button class="goal-btn goal-btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="goal-btn goal-btn-primary" onclick="updateGoalProgress(${index})">Сохранить</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            setTimeout(() => {
                document.getElementById('goalProgressInput').focus();
            }, 100);
        };

        window.updateGoalProgress = function(index) {
            const input = document.getElementById('goalProgressInput');
            if (input) {
                const progress = parseInt(input.value);
                if (!isNaN(progress) && progress >= 0 && progress <= 100) {
                    const goal = appData.profile.goals[index];
                    const wasNot100 = goal.progress !== 100;
                    goal.progress = progress;
                    
                    if (progress === 100 && wasNot100) {
                        celebrateGoal(goal.text);
                    }
                    
                    saveData().then(() => {
                        hapticFeedback('success');
                        closeModal();
                        renderPage();
                    });
                } else {
                    showToast('Введите число от 0 до 100');
                }
            }
        };

        window.celebrateGoal = function(goalText) {
            hapticFeedback('success');
            
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    confetti.style.width = Math.random() * 10 + 5 + 'px';
                    confetti.style.height = confetti.style.width;
                    confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 50);
            }
            
            if (tg) {
                tg.showPopup({
                    title: 'ПОЗДРАВЛЯЕМ! 🎉',
                    message: `Вы выполнили цель: "${goalText}"\n\n🌟 Вы супер! 🌟`,
                    buttons: [{type: 'close', text: 'Ура!'}]
                });
            }
            
            const celebration = document.createElement('div');
            celebration.className = 'celebration-modal';
            celebration.innerHTML = `
                <h2>ПОЗДРАВЛЯЕМ!</h2>
                <p>Вы выполнили цель:</p>
                <p><strong>"${goalText}"</strong></p>
                <p style="margin-top: 20px;">🌟 Вы супер! 🌟</p>
            `;
            document.body.appendChild(celebration);
            
            setTimeout(() => {
                celebration.remove();
            }, 4000);
            
            showToast('Цель достигнута! Поздравляем!');
        };

        window.deleteGoal = function(index) {
            hapticFeedback('light');
            if (confirm('Удалить цель?')) {
                appData.profile.goals.splice(index, 1);
                saveData().then(() => {
                    renderPage();
                    showToast('Цель удалена');
                });
            }
        };

        function extractVKVideoId(url) {
    try {
        console.log('Парсинг VK ссылки:', url);
        
        // Новые паттерны для vkvideo.ru и старых форматов
        const patterns = [
            // Новый формат: https://vkvideo.ru/video-123456_789012345
            /vkvideo\.ru\/video-?(\d+)_(\d+)/i,
            // Старый формат: https://vk.com/video-123456_789012345
            /vk\.com\/video-?(\d+)_(\d+)/i,
            // Формат с параметрами: https://vk.com/feed?z=video-123456_789012345
            /vk\.com\/(?:[\w\-]+)?\?.*?z=video-?(\d+)_(\d+)/i,
            // Мобильный формат: https://m.vk.com/video-123456_789012345
            /m\.vk\.com\/video-?(\d+)_(\d+)/i,
            // Формат video.php: https://vk.com/video.php?oid=-123456&id=789012345
            /vk\.com\/video\.php\?.*?oid=-?(\d+).*?id=(\d+)/i,
            // Просто video-123_456 в любом месте
            /video-?(\d+)_(\d+)/i
        ];
        
        for (const pattern of patterns) {
            const matches = url.match(pattern);
            if (matches) {
                console.log('Найдено совпадение по паттерну:', pattern, matches);
                
                let owner, id;
                
                if (matches.length === 3) {
                    // Формат: video-123_456 или video123_456
                    owner = matches[1];
                    id = matches[2];
                    
                    // Добавляем минус если его нет (для отрицательного owner)
                    if (!owner.startsWith('-') && !isNaN(owner)) {
                        owner = `-${owner}`;
                    }
                } else if (matches.length === 4) {
                    // Формат с z= параметром
                    owner = matches[2];
                    id = matches[3];
                    
                    if (!owner.startsWith('-') && !isNaN(owner)) {
                        owner = `-${owner}`;
                    }
                } else {
                    continue;
                }
                
                console.log('Извлечено:', { owner, id });
                
                // Проверяем, что ID выглядят как числа
                if (!isNaN(owner.replace('-', '')) && !isNaN(id)) {
                    return { owner, id, hash: '' };
                }
            }
        }
        
        // Если не нашли по паттернам, показываем понятную ошибку
        console.error('Не удалось распарсить ссылку:', url);
        showToast('Неправильная ссылка ВК. Используйте ссылку вида: https://vkvideo.ru/video-123456_789012345');
        return null;
    } catch (e) {
        console.error('Ошибка парсинга VK ссылки:', e);
        showToast('Ошибка при обработке ссылки ВК');
        return null;
    }
}

        window.openClip = function(clipId) {
    hapticFeedback('medium');
    const clip = appData.clips.find(c => c.id === clipId);
    if (!clip) return;
    
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.id = 'clipModal';
    
    const likeClass = clip.userReaction === 'like' ? 'liked' : '';
    const dislikeClass = clip.userReaction === 'dislike' ? 'disliked' : '';
    
    let commentsHtml = '';
    if (clip.comments) {
        clip.comments.forEach(c => {
            const [author, text] = c.split(': ');
            commentsHtml += `<div class="comment"><span class="comment-author">${author}</span>${text}</div>`;
        });
    }
    
    const videoUrl = clip.url;
    let videoHtml = '';
    
    // Прямые MP4 ссылки
    if (videoUrl.includes('.mp4') || videoUrl.includes('cdn.') || videoUrl.includes('mycdn.me') || videoUrl.includes('storage')) {
        videoHtml = `
            <video controls style="width: 100%; border-radius: 16px;" playsinline>
                <source src="${videoUrl}" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
        `;
    } 
    // VK видео (новый формат vkvideo.ru и старый)
    else if (videoUrl.includes('vk.com/video') || videoUrl.includes('vkvideo.ru/video')) {
        const videoId = extractVKVideoId(videoUrl);
        if (videoId) {
            console.log('Загружаем VK видео с ID:', videoId);
            videoHtml = `
                <iframe 
                    src="https://vk.com/video_ext.php?oid=${videoId.owner}&id=${videoId.id}&hash=${videoId.hash}&autoplay=0" 
                    width="100%" 
                    height="200" 
                    frameborder="0" 
                    allowfullscreen>
                </iframe>
            `;
        } else {
            videoHtml = `<div style="padding: 40px; text-align: center; color: var(--cancel-color);">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="margin-bottom: 16px;">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <p>Не удалось загрузить видео из ВК</p>
                <p style="font-size: 12px; margin-top: 8px;">Проверьте ссылку: ${videoUrl}</p>
            </div>`;
        }
    }
    // YouTube
    else if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be')) {
        let youtubeId = '';
        if (videoUrl.includes('youtu.be/')) {
            youtubeId = videoUrl.split('youtu.be/')[1].split('?')[0];
        } else if (videoUrl.includes('watch?v=')) {
            youtubeId = videoUrl.split('watch?v=')[1].split('&')[0];
        }
        videoHtml = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${youtubeId}" frameborder="0" allowfullscreen></iframe>`;
    }
    // Пробуем как MP4
    else {
        videoHtml = `
            <video controls style="width: 100%; border-radius: 16px;" playsinline>
                <source src="${videoUrl}" type="video/mp4">
                <p style="padding: 20px; color: var(--cancel-color);">Видео не поддерживается. Попробуйте другую ссылку.</p>
            </video>
        `;
    }
    
    modal.innerHTML = `
        <div class="modal-content">
            <div class="video-placeholder" style="padding: 0; background: black; min-height: 200px;">
                ${videoHtml}
            </div>
            <h3 style="font-size:18px; margin:12px 0 6px;">${clip.title}</h3>
            <p style="font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:12px;">${clip.description}</p>
            
            <div class="reactions-container">
                <div class="reaction-btn ${likeClass}" onclick="handleReaction(${clipId}, 'like')">
                    <div class="reaction-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></div>
                    <span class="reaction-count">${clip.likes || 0}</span>
                    <span class="reaction-label">Нравится</span>
                </div>
                <div class="reaction-btn ${dislikeClass}" onclick="handleReaction(${clipId}, 'dislike')">
                    <div class="reaction-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H7m10 0h3a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"/></svg></div>
                    <span class="reaction-count">${clip.dislikes || 0}</span>
                    <span class="reaction-label">Не нравится</span>
                </div>
            </div>
            
            <div class="comments-section">${commentsHtml || '<div style="text-align:center; color:rgba(255,255,255,0.2);">Нет комментариев</div>'}</div>
            
            <div style="display:flex; gap:8px; margin:14px 0;">
                <input type="text" class="admin-input" id="newComment" placeholder="Комментарий..." style="flex:1; padding:12px; text-align:left;">
                <button class="admin-btn" onclick="addComment(${clipId})" style="width:auto; padding:12px 18px;">➤</button>
            </div>
            
            <button class="admin-btn secondary" onclick="closeModal()">Закрыть</button>
        </div>
    `;
    
    document.body.appendChild(modal);
};

        window.handleReaction = function(clipId, type) {
            hapticFeedback('light');
            const clip = appData.clips.find(c => c.id === clipId);
            if (!clip) return;
            
            if (clip.userReaction === type) {
                clip[type === 'like' ? 'likes' : 'dislikes'] = (clip[type === 'like' ? 'likes' : 'dislikes'] || 0) - 1;
                clip.userReaction = null;
            } else {
                if (clip.userReaction) {
                    clip[clip.userReaction === 'like' ? 'likes' : 'dislikes'] = (clip[clip.userReaction === 'like' ? 'likes' : 'dislikes'] || 0) - 1;
                }
                clip[type === 'like' ? 'likes' : 'dislikes'] = (clip[type === 'like' ? 'likes' : 'dislikes'] || 0) + 1;
                clip.userReaction = type;
            }
            
            saveData().then(() => {
                closeModal();
                openClip(clipId);
            });
        };

        window.addComment = function(clipId) {
            const comment = document.getElementById('newComment')?.value;
            if (comment?.trim()) {
                hapticFeedback('light');
                const clip = appData.clips.find(c => c.id === clipId);
                if (clip) {
                    if (!clip.comments) clip.comments = [];
                    clip.comments.push('Вы: ' + comment.trim());
                    saveData().then(() => {
                        closeModal();
                        openClip(clipId);
                    });
                }
            }
        };

        window.closeModal = function() {
            document.getElementById('clipModal')?.remove();
            document.getElementById('addGoalModal')?.remove();
            document.getElementById('editGoalModal')?.remove();
            document.getElementById('addNotificationModal')?.remove();
            document.querySelector('.modal')?.remove();
        };

        window.changeMonth = function(delta) {
            hapticFeedback('light');
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderPage();
        };

        window.selectDate = function(date) {
            hapticFeedback('light');
            selectedDate = date;
            renderPage();
        };

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}`;
        }

        window.toggleCancelTraining = async function(date, time, name) {
            if (!isAdmin) return;
            
            hapticFeedback('medium');
            const trainingKey = `${time} ${name}`;
            
            if (!appData.cancelledTrainings[date]) {
                appData.cancelledTrainings[date] = [];
            }
            
            const index = appData.cancelledTrainings[date].indexOf(trainingKey);
            
            if (index === -1) {
                appData.cancelledTrainings[date].push(trainingKey);
                showToast('❌ Тренировка отменена');
            } else {
                appData.cancelledTrainings[date].splice(index, 1);
                showToast('✅ Тренировка восстановлена');
            }
            
            if (appData.cancelledTrainings[date].length === 0) {
                delete appData.cancelledTrainings[date];
            }
            
            await saveData();
            renderPage();
        };

        window.addClip = function() {
            if (!isAdmin) return;
            
            const title = document.getElementById('clipTitle')?.value;
            const desc = document.getElementById('clipDesc')?.value;
            const url = document.getElementById('clipUrl')?.value;
            
            if (title && desc && url) {
                hapticFeedback('medium');
                
                const newClip = {
                    id: Date.now(),
                    title: title,
                    description: desc,
                    url: url,
                    likes: 0,
                    dislikes: 0,
                    userReaction: null,
                    comments: []
                };
                
                appData.clips.push(newClip);
                
                document.getElementById('clipTitle').value = '';
                document.getElementById('clipDesc').value = '';
                document.getElementById('clipUrl').value = '';
                
                saveData().then(() => {
                    if (currentPage === 'clips') {
                        renderPage();
                    }
                    updateAdminClipList();
                    showToast('Клип добавлен и будет виден всем пользователям!');
                    
                    if (tg) {
                        tg.showPopup({
                            title: 'Клип добавлен',
                            message: `Клип "${title}" теперь виден всем пользователям`,
                            buttons: [{type: 'close', text: 'Ок'}]
                        });
                    }
                });
            } else {
                showToast('Заполните все поля');
            }
        };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
