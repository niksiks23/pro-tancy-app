<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO ТАНЦЫ - танцевальный клуб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0f2a 50%, #2d1b3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Анимации загрузки */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #2d1b3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .splash-content {
            text-align: center;
            animation: pulse 2s infinite;
        }

        .splash-logo {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid #b721ff;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .app {
            max-width: 450px;
            width: 100%;
            min-height: 600px;
            background: rgba(20, 10, 30, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 0 2px rgba(183, 33, 255, 0.3);
            overflow: hidden;
            position: relative;
            margin: 20px;
        }

        .app-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(183, 33, 255, 0.3);
            animation: slideDown 0.5s ease;
        }

        .app-header h1 {
            font-size: 2rem;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Навигация */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(10, 5, 15, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(183, 33, 255, 0.3);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .nav-item.active {
            color: #b721ff;
            transform: translateY(-3px);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }

        .nav-item.active svg {
            filter: drop-shadow(0 0 8px #b721ff);
        }

        /* Контент */
        .content {
            padding: 20px;
            height: calc(100% - 140px);
            overflow-y: auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Клипы */
        .clips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .clip-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(183, 33, 255, 0.2);
        }

        .clip-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: #b721ff;
            box-shadow: 0 10px 30px rgba(183, 33, 255, 0.3);
        }

        .clip-thumbnail {
            width: 100%;
            height: 140px;
            background: linear-gradient(45deg, #2d1b3a, #1a0f2a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .clip-thumbnail svg {
            width: 50px;
            height: 50px;
            color: #b721ff;
        }

        .clip-info {
            padding: 10px;
        }

        .clip-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .clip-description {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Модальное окно клипа */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            width: 90%;
            max-width: 400px;
            background: linear-gradient(135deg, #1a0f2a, #2d1b3a);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #b721ff;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .video-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .reactions {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .reaction-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(183, 33, 255, 0.3);
        }

        .reaction-btn:hover {
            background: rgba(183, 33, 255, 0.2);
            transform: scale(1.05);
        }

        .comments-section {
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin: 15px 0;
        }

        .comment {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .comment:last-child {
            border-bottom: none;
        }

        /* Календарь */
        .calendar {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .calendar-day:hover {
            background: rgba(183, 33, 255, 0.3);
            transform: scale(1.05);
        }

        .calendar-day.has-training {
            background: linear-gradient(135deg, #b721ff, #21d4fd);
            color: white;
            font-weight: 600;
        }

        .calendar-day.selected {
            border: 2px solid #b721ff;
            box-shadow: 0 0 15px #b721ff;
        }

        .trainings-list {
            margin-top: 20px;
        }

        .training-item {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #b721ff;
            animation: slideRight 0.3s ease;
        }

        @keyframes slideRight {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Админ панель */
        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            background: linear-gradient(135deg, #1a0f2a, #2d1b3a);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid #b721ff;
            z-index: 2000;
            animation: scaleIn 0.3s ease;
        }

        @keyframes scaleIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .admin-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(183, 33, 255, 0.3);
            border-radius: 10px;
            color: white;
            transition: all 0.3s ease;
        }

        .admin-input:focus {
            outline: none;
            border-color: #b721ff;
            box-shadow: 0 0 15px rgba(183, 33, 255, 0.3);
        }

        .admin-btn {
            padding: 12px 20px;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(183, 33, 255, 0.5);
        }

        .admin-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .admin-lock {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(183, 33, 255, 0.9);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .admin-lock:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px #b721ff;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Сплаш экран -->
        <div class="splash-screen" id="splash">
            <div class="splash-content">
                <div class="splash-logo">PRO ТАНЦЫ</div>
                <div class="loader"></div>
            </div>
        </div>

        <!-- Основное приложение -->
        <div class="app" style="display: none;" id="mainApp">
            <header class="app-header">
                <h1>PRO ТАНЦЫ</h1>
            </header>

            <!-- Навигация -->
            <nav class="nav-bar" id="navigation">
                <div class="nav-item active" data-page="clips">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="4" />
                        <path d="M8 2v20M16 2v20M2 8h20M2 16h20" />
                    </svg>
                    <span>Клипы</span>
                </div>
                <div class="nav-item" data-page="schedule">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <span>Расписание</span>
                </div>
                <div class="nav-item" data-page="rules">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span>Правила</span>
                </div>
                <div class="nav-item" data-page="classes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
                        <line x1="6" y1="1" x2="6" y2="4" />
                        <line x1="10" y1="1" x2="10" y2="4" />
                        <line x1="14" y1="1" x2="14" y2="4" />
                    </svg>
                    <span>Занятия</span>
                </div>
            </nav>

            <!-- Контент -->
            <div class="content" id="content">
                <!-- Динамически загружается -->
            </div>
        </div>

        <!-- Админ кнопка -->
        <div class="admin-lock" id="adminLock">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        </div>

        <!-- Админ панель -->
        <div class="admin-panel" id="adminPanel" style="display: none;">
            <h2 style="margin-bottom: 20px;">Админ панель</h2>
            <input type="password" class="admin-input" id="adminPassword" placeholder="Введите пароль" />
            <button class="admin-btn" onclick="checkAdminPassword()">Войти</button>
            <button class="admin-btn secondary" onclick="closeAdminPanel()">Отмена</button>
        </div>

        <!-- Админ меню -->
        <div class="admin-panel" id="adminMenu" style="display: none;">
            <h2 style="margin-bottom: 20px;">Управление</h2>
            
            <h3>Добавить клип</h3>
            <input type="text" class="admin-input" id="clipTitle" placeholder="Название клипа" />
            <input type="text" class="admin-input" id="clipDesc" placeholder="Описание" />
            <input type="text" class="admin-input" id="clipUrl" placeholder="URL видео" />
            <button class="admin-btn" onclick="addClip()">Добавить клип</button>

            <h3 style="margin-top: 20px;">Расписание</h3>
            <input type="date" class="admin-input" id="trainingDate" />
            <input type="time" class="admin-input" id="trainingTime" />
            <input type="text" class="admin-input" id="trainingName" placeholder="Название тренировки" />
            <button class="admin-btn" onclick="addTraining()">Добавить тренировку</button>
            <button class="admin-btn secondary" onclick="clearTraining()">Очистить день</button>
            
            <button class="admin-btn secondary" style="margin-top: 20px;" onclick="logoutAdmin()">Выйти</button>
        </div>
    </div>

    <script>
        // Данные приложения
        let appData = {
            clips: [
                {
                    id: 1,
                    title: 'Современная хореография',
                    description: 'Урок современного танца',
                    url: 'https://example.com/video1',
                    reactions: { likes: 45, hearts: 32, fire: 18 },
                    comments: ['Круто!', 'Хочу научиться']
                },
                {
                    id: 2,
                    title: 'Hip-Hop база',
                    description: 'Основные движения',
                    url: 'https://example.com/video2',
                    reactions: { likes: 38, hearts: 25, fire: 12 },
                    comments: ['Отлично объясняете', 'Спасибо за урок']
                }
            ],
            trainings: {
                '2024-02-25': ['18:00 - Хип-хоп', '20:00 - Контемп'],
                '2024-02-26': ['19:00 - Брейк-данс'],
                '2024-02-27': ['18:30 - Джаз-фанк']
            },
            rules: '1. Приходить за 15 минут до начала\n2. Сменная обувь обязательна\n3. Питьевая вода с собой\n4. Сообщать о пропусках заранее'
        };

        let currentPage = 'clips';
        let selectedClip = null;
        let selectedDate = '2024-02-25';
        let isAdmin = false;

        // Инициализация
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
            }, 500);
        }, 2000);

        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                currentPage = this.dataset.page;
                renderPage();
            });
        });

        // Рендер страниц
        function renderPage() {
            const content = document.getElementById('content');
            
            switch(currentPage) {
                case 'clips':
                    renderClips(content);
                    break;
                case 'schedule':
                    renderSchedule(content);
                    break;
                case 'rules':
                    renderRules(content);
                    break;
                case 'classes':
                    renderClasses(content);
                    break;
            }
        }

        function renderClips(container) {
            let html = '<div class="clips-grid">';
            
            appData.clips.forEach(clip => {
                html += `
                    <div class="clip-card" onclick="openClip(${clip.id})">
                        <div class="clip-thumbnail">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" />
                            </svg>
                        </div>
                        <div class="clip-info">
                            <div class="clip-title">${clip.title}</div>
                            <div class="clip-description">${clip.description}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        function renderSchedule(container) {
            const daysInMonth = 28;
            const currentDate = new Date();
            const month = currentDate.toLocaleString('ru', { month: 'long' });
            
            let html = `
                <div class="calendar">
                    <div class="calendar-header">
                        <span>${month} ${currentDate.getFullYear()}</span>
                    </div>
                    <div class="calendar-grid">
                        <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
            `;
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `2024-02-${i.toString().padStart(2, '0')}`;
                const hasTraining = appData.trainings[dateStr];
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" 
                         onclick="selectDate('${dateStr}')">
                        ${i}
                    </div>
                `;
            }
            
            html += '</div></div>';
            
            // Тренировки на выбранный день
            html += '<div class="trainings-list">';
            if (appData.trainings[selectedDate]) {
                appData.trainings[selectedDate].forEach(training => {
                    html += `<div class="training-item">${training}</div>`;
                });
            } else {
                html += '<div class="training-item" style="opacity:0.5;">Нет тренировок</div>';
            }
            html += '</div>';
            
            container.innerHTML = html;
        }

        function renderRules(container) {
            container.innerHTML = `
                <div style="padding: 20px; background: rgba(255,255,255,0.03); border-radius: 20px;">
                    <h2 style="margin-bottom: 20px;">Правила посещения</h2>
                    <pre style="white-space: pre-wrap; font-family: inherit; line-height: 1.8;">${appData.rules}</pre>
                </div>
            `;
        }

        function renderClasses(container) {
            container.innerHTML = `
                <div style="text-align: center; padding: 50px 20px; background: rgba(255,255,255,0.03); border-radius: 20px;">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#b721ff" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <h3 style="margin: 20px 0; color: #b721ff;">Скоро появятся</h3>
                    <p style="color: rgba(255,255,255,0.5);">Расписание занятий будет доступно в ближайшее время</p>
                </div>
            `;
        }

        // Функции для работы с клипами
        window.openClip = function(clipId) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (!clip) return;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'clipModal';
            
            let reactionsHtml = '';
            for (let [key, value] of Object.entries(clip.reactions)) {
                reactionsHtml += `
                    <div class="reaction-btn" onclick="addReaction(${clipId}, '${key}')">
                        ${key === 'likes' ? '👍' : key === 'hearts' ? '❤️' : '🔥'} ${value}
                    </div>
                `;
            }
            
            let commentsHtml = '';
            clip.comments.forEach(comment => {
                commentsHtml += `<div class="comment">${comment}</div>`;
            });
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="video-placeholder">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <polygon points="10 8 16 12 10 16 10 8" fill="white" />
                        </svg>
                    </div>
                    <h3>${clip.title}</h3>
                    <p style="margin: 10px 0; color: rgba(255,255,255,0.7);">${clip.description}</p>
                    
                    <div class="reactions">
                        ${reactionsHtml}
                    </div>
                    
                    <div class="comments-section">
                        ${commentsHtml}
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <input type="text" class="admin-input" id="newComment" placeholder="Добавить комментарий..." />
                        <button class="admin-btn" onclick="addComment(${clipId})">➤</button>
                    </div>
                    
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button class="admin-btn secondary" onclick="shareClip('${clip.title}')">Поделиться</button>
                        <button class="admin-btn secondary" onclick="closeModal()">Закрыть</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        };

        window.addReaction = function(clipId, reactionType) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (clip) {
                clip.reactions[reactionType] = (clip.reactions[reactionType] || 0) + 1;
                closeModal();
                openClip(clipId);
            }
        };

        window.addComment = function(clipId) {
            const comment = document.getElementById('newComment').value;
            if (comment.trim()) {
                const clip = appData.clips.find(c => c.id === clipId);
                if (clip) {
                    clip.comments.push(comment);
                    closeModal();
                    openClip(clipId);
                }
            }
        };

        window.shareClip = function(title) {
            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: 'Посмотри этот танец!',
                    url: window.location.href,
                });
            } else {
                alert('Скопируйте ссылку: ' + window.location.href);
            }
        };

        // Функции для расписания
        window.selectDate = function(date) {
            selectedDate = date;
            renderPage();
        };

        // Админ панель
        document.getElementById('adminLock').addEventListener('click', () => {
            document.getElementById('adminPanel').style.display = 'block';
        });

        window.checkAdminPassword = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') { // Смените пароль на свой!
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'none';
                document.getElementById('adminMenu').style.display = 'block';
            } else {
                alert('Неверный пароль!');
            }
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        };

        window.logoutAdmin = function() {
            isAdmin = false;
            document.getElementById('adminMenu').style.display = 'none';
        };

        window.addClip = function() {
            if (!isAdmin) return;
            
            const title = document.getElementById('clipTitle').value;
            const desc = document.getElementById('clipDesc').value;
            const url = document.getElementById('clipUrl').value;
            
            if (title && desc && url) {
                appData.clips.push({
                    id: appData.clips.length + 1,
                    title: title,
                    description: desc,
                    url: url,
                    reactions: { likes: 0, hearts: 0, fire: 0 },
                    comments: []
                });
                
                // Очистка полей
                document.getElementById('clipTitle').value = '';
                document.getElementById('clipDesc').value = '';
                document.getElementById('clipUrl').value = '';
                
                // Обновление страницы
                if (currentPage === 'clips') renderPage();
                
                alert('Клип добавлен!');
            }
        };

        window.addTraining = function() {
            if (!isAdmin) return;
            
            const date = document.getElementById('trainingDate').value;
            const time = document.getElementById('trainingTime').value;
            const name = document.getElementById('trainingName').value;
            
            if (date && time && name) {
                if (!appData.trainings[date]) {
                    appData.trainings[date] = [];
                }
                
                appData.trainings[date].push(`${time} - ${name}`);
                
                // Очистка полей
                document.getElementById('trainingDate').value = '';
                document.getElementById('trainingTime').value = '';
                document.getElementById('trainingName').value = '';
                
                // Обновление страницы
                if (currentPage === 'schedule') renderPage();
                
                alert('Тренировка добавлена!');
            }
        };

        window.clearTraining = function() {
            if (!isAdmin) return;
            
            const date = document.getElementById('trainingDate').value;
            if (date && appData.trainings[date]) {
                delete appData.trainings[date];
                
                document.getElementById('trainingDate').value = '';
                
                if (currentPage === 'schedule') renderPage();
                
                alert('Тренировки удалены!');
            }
        };

        window.closeModal = function() {
            const modal = document.getElementById('clipModal');
            if (modal) modal.remove();
        };

        // Закрытие модального окна по клику вне его
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });

        // Начальный рендер
        renderPage();
    </script>
</body>
</html>
