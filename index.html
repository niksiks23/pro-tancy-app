<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO ТАНЦЫ - танцевальный клуб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* Сплаш экран */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0f 0%, #2d1b3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .splash-content {
            text-align: center;
            animation: pulse 2s infinite;
        }

        .splash-logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #b721ff;
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Основное приложение */
        .app {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0f2a 50%, #2d1b3a 100%);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .app-header {
            padding: 20px 16px 10px;
            text-align: center;
            background: rgba(10, 5, 15, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(183, 33, 255, 0.2);
            animation: slideDown 0.5s ease;
            flex-shrink: 0;
        }

        .app-header h1 {
            font-size: 1.8rem;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        /* Навигация */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 8px 4px;
            background: rgba(10, 5, 15, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(183, 33, 255, 0.2);
            flex-shrink: 0;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            padding: 8px 12px;
            border-radius: 20px;
            -webkit-tap-highlight-color: transparent;
            flex: 1;
            max-width: 80px;
        }

        .nav-item.active {
            color: #b721ff;
            background: rgba(183, 33, 255, 0.1);
            transform: translateY(-2px);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            transition: all 0.3s ease;
        }

        .nav-item.active svg {
            filter: drop-shadow(0 0 8px #b721ff);
        }

        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
            animation: fadeIn 0.5s ease;
            scrollbar-width: thin;
            scrollbar-color: #b721ff rgba(255, 255, 255, 0.1);
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }

        .content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
        }

        .content::-webkit-scrollbar-thumb {
            background: #b721ff;
            border-radius: 4px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Клипы - сетка */
        .clips-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 4px 0;
        }

        .clip-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid rgba(183, 33, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            animation: cardAppear 0.5s ease;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .clip-card:active {
            transform: scale(0.98);
            background: rgba(183, 33, 255, 0.1);
        }

        .clip-thumbnail {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(45deg, #2d1b3a, #1a0f2a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .clip-thumbnail svg {
            width: 40px;
            height: 40px;
            color: #b721ff;
            opacity: 0.8;
        }

        .clip-info {
            padding: 12px;
        }

        .clip-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip-description {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Модальное окно клипа */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
            padding: 16px;
        }

        .modal-content {
            width: 100%;
            max-width: 400px;
            max-height: 90vh;
            background: linear-gradient(135deg, #1a0f2a, #2d1b3a);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid rgba(183, 33, 255, 0.3);
            animation: slideUp 0.4s ease;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .reactions {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            flex-wrap: wrap;
        }

        .reaction-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(183, 33, 255, 0.3);
            font-size: 0.9rem;
            -webkit-tap-highlight-color: transparent;
        }

        .reaction-btn:active {
            background: rgba(183, 33, 255, 0.3);
            transform: scale(0.95);
        }

        .comments-section {
            max-height: 200px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            margin: 16px 0;
            -webkit-overflow-scrolling: touch;
        }

        .comment {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.9rem;
            word-break: break-word;
        }

        .comment:last-child {
            border-bottom: none;
        }

        /* Календарь */
        .calendar {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 16px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
        }

        .calendar-weekday {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            -webkit-tap-highlight-color: transparent;
        }

        .calendar-day:active {
            transform: scale(0.9);
            background: rgba(183, 33, 255, 0.3);
        }

        .calendar-day.has-training {
            background: linear-gradient(135deg, #b721ff, #21d4fd);
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(183, 33, 255, 0.3);
        }

        .calendar-day.selected {
            border: 2px solid #b721ff;
            box-shadow: 0 0 15px #b721ff;
        }

        .trainings-list {
            margin-top: 20px;
        }

        .training-item {
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            margin-bottom: 10px;
            border-left: 4px solid #b721ff;
            animation: slideRight 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-size: 0.95rem;
        }

        @keyframes slideRight {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Правила */
        .rules-container {
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(183, 33, 255, 0.2);
        }

        .rules-container h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rules-text {
            line-height: 1.8;
            font-size: 1rem;
            white-space: pre-wrap;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Страница занятий */
        .classes-placeholder {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            animation: pulse 2s infinite;
        }

        /* Админ панель */
        .admin-lock {
            position: fixed;
            bottom: 80px;
            right: 16px;
            background: rgba(183, 33, 255, 0.9);
            width: 50px;
            height: 50px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
            border: 2px solid white;
            box-shadow: 0 4px 15px rgba(183, 33, 255, 0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .admin-lock:active {
            transform: scale(0.9);
        }

        .admin-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 380px;
            max-height: 90vh;
            overflow-y: auto;
            background: linear-gradient(135deg, #1a0f2a, #2d1b3a);
            border-radius: 24px;
            padding: 24px;
            border: 2px solid #b721ff;
            z-index: 2000;
            animation: scaleIn 0.3s ease;
            -webkit-overflow-scrolling: touch;
        }

        @keyframes scaleIn {
            from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .admin-input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(183, 33, 255, 0.3);
            border-radius: 12px;
            color: white;
            transition: all 0.3s ease;
            font-size: 1rem;
            -webkit-appearance: none;
        }

        .admin-input:focus {
            outline: none;
            border-color: #b721ff;
            box-shadow: 0 0 15px rgba(183, 33, 255, 0.3);
        }

        .admin-btn {
            padding: 14px 20px;
            background: linear-gradient(45deg, #b721ff, #21d4fd);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
            font-size: 1rem;
            width: calc(100% - 10px);
            -webkit-tap-highlight-color: transparent;
        }

        .admin-btn:active {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(183, 33, 255, 0.5);
        }

        .admin-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .admin-section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(183, 33, 255, 0.2);
        }

        .admin-section h3 {
            margin-bottom: 12px;
            color: #b721ff;
            font-size: 1.1rem;
        }

        /* Уведомления */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(183, 33, 255, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 3000;
            animation: toastIn 0.3s ease;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        @keyframes toastIn {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        /* Адаптация под безопасную зону */
        @supports (padding: max(0px)) {
            .app-header {
                padding-top: max(20px, env(safe-area-inset-top));
            }
            
            .nav-bar {
                padding-bottom: max(8px, env(safe-area-inset-bottom));
            }
            
            .admin-lock {
                bottom: max(80px, env(safe-area-inset-bottom) + 80px);
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Сплаш экран -->
        <div class="splash-screen" id="splash">
            <div class="splash-content">
                <div class="splash-logo">PRO ТАНЦЫ</div>
                <div class="loader"></div>
            </div>
        </div>

        <!-- Основное приложение -->
        <div class="app" style="display: none;" id="mainApp">
            <header class="app-header">
                <h1>PRO ТАНЦЫ</h1>
            </header>

            <!-- Навигация -->
            <nav class="nav-bar" id="navigation">
                <div class="nav-item active" data-page="clips">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="4" />
                        <path d="M8 2v20M16 2v20M2 8h20M2 16h20" />
                    </svg>
                    <span>Клипы</span>
                </div>
                <div class="nav-item" data-page="schedule">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <span>Расписание</span>
                </div>
                <div class="nav-item" data-page="rules">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span>Правила</span>
                </div>
                <div class="nav-item" data-page="classes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
                        <line x1="6" y1="1" x2="6" y2="4" />
                        <line x1="10" y1="1" x2="10" y2="4" />
                        <line x1="14" y1="1" x2="14" y2="4" />
                    </svg>
                    <span>Занятия</span>
                </div>
            </nav>

            <!-- Контент -->
            <div class="content" id="content"></div>
        </div>

        <!-- Админ кнопка -->
        <div class="admin-lock" id="adminLock">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
        </div>

        <!-- Админ панель -->
        <div class="admin-panel" id="adminPanel" style="display: none;">
            <h2 style="margin-bottom: 20px; text-align: center;">Вход администратора</h2>
            <input type="password" class="admin-input" id="adminPassword" placeholder="Пароль" />
            <button class="admin-btn" onclick="checkAdminPassword()">Войти</button>
            <button class="admin-btn secondary" onclick="closeAdminPanel()">Отмена</button>
        </div>

        <!-- Админ меню -->
        <div class="admin-panel" id="adminMenu" style="display: none;">
            <h2 style="margin-bottom: 20px; text-align: center;">Админ панель</h2>
            
            <div class="admin-section">
                <h3>➕ Добавить клип</h3>
                <input type="text" class="admin-input" id="clipTitle" placeholder="Название" />
                <input type="text" class="admin-input" id="clipDesc" placeholder="Описание" />
                <input type="url" class="admin-input" id="clipUrl" placeholder="URL видео" />
                <button class="admin-btn" onclick="addClip()">Добавить</button>
            </div>

            <div class="admin-section">
                <h3>📅 Управление расписанием</h3>
                <input type="date" class="admin-input" id="trainingDate" />
                <input type="time" class="admin-input" id="trainingTime" />
                <input type="text" class="admin-input" id="trainingName" placeholder="Название" />
                <button class="admin-btn" onclick="addTraining()">Добавить</button>
                <button class="admin-btn secondary" onclick="clearTraining()">Очистить день</button>
            </div>
            
            <div class="admin-section">
                <h3>📝 Правила посещения</h3>
                <textarea class="admin-input" id="rulesText" rows="4" placeholder="Текст правил">${appData?.rules || ''}</textarea>
                <button class="admin-btn" onclick="saveRules()">Сохранить правила</button>
            </div>
            
            <button class="admin-btn secondary" onclick="logoutAdmin()">Выйти</button>
        </div>
    </div>

    <script>
        // Данные приложения
        let appData = {
            clips: [
                {
                    id: 1,
                    title: 'Современная хореография',
                    description: 'Урок современного танца',
                    url: 'https://example.com/video1',
                    reactions: { likes: 45, hearts: 32, fire: 18 },
                    comments: ['Круто! 🔥', 'Хочу научиться']
                },
                {
                    id: 2,
                    title: 'Hip-Hop база',
                    description: 'Основные движения',
                    url: 'https://example.com/video2',
                    reactions: { likes: 38, hearts: 25, fire: 12 },
                    comments: ['Отлично объясняете', 'Спасибо за урок']
                },
                {
                    id: 3,
                    title: 'Dancehall',
                    description: 'Зажигательный урок',
                    url: 'https://example.com/video3',
                    reactions: { likes: 52, hearts: 41, fire: 28 },
                    comments: ['Супер!', 'Хочу на занятие']
                }
            ],
            trainings: {
                '2024-02-25': ['18:00 - Хип-хоп (базовый)', '20:00 - Контемп (продвинутый)'],
                '2024-02-26': ['19:00 - Брейк-данс'],
                '2024-02-27': ['18:30 - Джаз-фанк'],
                '2024-02-28': ['17:00 - Dancehall', '19:30 - High Heels']
            },
            rules: '1. Приходить за 15 минут до начала\n2. Сменная обувь обязательна\n3. Питьевая вода с собой\n4. Сообщать о пропусках заранее\n5. Форма одежды - свободная, не стесняющая движений'
        };

        let currentPage = 'clips';
        let selectedClip = null;
        let selectedDate = new Date().toISOString().split('T')[0];
        let isAdmin = false;

        // Инициализация
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash').style.display = 'none';
                document.getElementById('mainApp').style.display = 'flex';
                document.getElementById('mainApp').style.flexDirection = 'column';
            }, 500);
        }, 2000);

        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');
                currentPage = this.dataset.page;
                renderPage();
            });
        });

        // Рендер страниц
        function renderPage() {
            const content = document.getElementById('content');
            if (!content) return;
            
            switch(currentPage) {
                case 'clips':
                    renderClips(content);
                    break;
                case 'schedule':
                    renderSchedule(content);
                    break;
                case 'rules':
                    renderRules(content);
                    break;
                case 'classes':
                    renderClasses(content);
                    break;
            }
        }

        function renderClips(container) {
            let html = '<div class="clips-grid">';
            
            appData.clips.forEach((clip, index) => {
                html += `
                    <div class="clip-card" onclick="openClip(${clip.id})" style="animation-delay: ${index * 0.1}s">
                        <div class="clip-thumbnail">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" />
                            </svg>
                        </div>
                        <div class="clip-info">
                            <div class="clip-title">${clip.title}</div>
                            <div class="clip-description">${clip.description}</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        function renderSchedule(container) {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay() || 7;
            
            const months = [
                'Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
            ];
            
            let html = `
                <div class="calendar">
                    <div class="calendar-header">
                        <span>${months[month]} ${year}</span>
                    </div>
                    <div class="calendar-grid">
                        <div class="calendar-weekday">Пн</div>
                        <div class="calendar-weekday">Вт</div>
                        <div class="calendar-weekday">Ср</div>
                        <div class="calendar-weekday">Чт</div>
                        <div class="calendar-weekday">Пт</div>
                        <div class="calendar-weekday">Сб</div>
                        <div class="calendar-weekday">Вс</div>
            `;
            
            // Пустые ячейки перед первым днем
            for (let i = 1; i < startDay; i++) {
                html += '<div class="calendar-day" style="opacity:0.3;"></div>';
            }
            
            // Дни месяца
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const hasTraining = appData.trainings[dateStr];
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" 
                         onclick="selectDate('${dateStr}')">
                        ${i}
                    </div>
                `;
            }
            
            html += '</div></div>';
            
            // Тренировки на выбранный день
            html += '<div class="trainings-list">';
            if (appData.trainings[selectedDate]) {
                appData.trainings[selectedDate].forEach(training => {
                    html += `<div class="training-item">${training}</div>`;
                });
            } else {
                html += '<div class="training-item" style="opacity:0.5; text-align:center;">Нет тренировок</div>';
            }
            html += '</div>';
            
            container.innerHTML = html;
        }

        function renderRules(container) {
            container.innerHTML = `
                <div class="rules-container">
                    <h2>Правила посещения</h2>
                    <div class="rules-text">${appData.rules.replace(/\n/g, '<br>')}</div>
                </div>
            `;
        }

        function renderClasses(container) {
            container.innerHTML = `
                <div class="classes-placeholder">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#b721ff" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <h3 style="margin: 20px 0; color: #b721ff;">Скоро появятся</h3>
                    <p style="color: rgba(255,255,255,0.5);">Расписание занятий будет доступно в ближайшее время</p>
                </div>
            `;
        }

        // Функции для работы с клипами
        window.openClip = function(clipId) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (!clip) return;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'clipModal';
            
            let reactionsHtml = '';
            for (let [key, value] of Object.entries(clip.reactions)) {
                const emoji = key === 'likes' ? '👍' : key === 'hearts' ? '❤️' : '🔥';
                reactionsHtml += `
                    <div class="reaction-btn" onclick="addReaction(${clipId}, '${key}')">
                        ${emoji} ${value}
                    </div>
                `;
            }
            
            let commentsHtml = '';
            clip.comments.forEach(comment => {
                commentsHtml += `<div class="comment">${comment}</div>`;
            });
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="video-placeholder">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <polygon points="10 8 16 12 10 16 10 8" fill="white" />
                        </svg>
                    </div>
                    <h3 style="font-size: 1.2rem;">${clip.title}</h3>
                    <p style="margin: 10px 0; color: rgba(255,255,255,0.7); font-size: 0.95rem;">${clip.description}</p>
                    
                    <div class="reactions">
                        ${reactionsHtml}
                    </div>
                    
                    <div class="comments-section">
                        ${commentsHtml || '<div style="text-align:center; color:rgba(255,255,255,0.3);">Нет комментариев</div>'}
                    </div>
                    
                    <div style="display: flex; gap: 8px; margin-top: 15px;">
                        <input type="text" class="admin-input" id="newComment" placeholder="Добавить комментарий..." style="flex:1;" />
                        <button class="admin-btn" onclick="addComment(${clipId})" style="width: auto; padding: 14px 20px;">➤</button>
                    </div>
                    
                    <div style="display: flex; gap: 8px; margin-top: 15px;">
                        <button class="admin-btn secondary" onclick="shareClip('${clip.title}')" style="flex:1;">Поделиться</button>
                        <button class="admin-btn secondary" onclick="closeModal()" style="flex:1;">Закрыть</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
        };

        window.addReaction = function(clipId, reactionType) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (clip) {
                clip.reactions[reactionType] = (clip.reactions[reactionType] || 0) + 1;
                closeModal();
                openClip(clipId);
            }
        };

        window.addComment = function(clipId) {
            const comment = document.getElementById('newComment')?.value;
            if (comment && comment.trim()) {
                const clip = appData.clips.find(c => c.id === clipId);
                if (clip) {
                    clip.comments.push(comment.trim());
                    closeModal();
                    openClip(clipId);
                }
            }
        };

        window.shareClip = function(title) {
            if (navigator.share) {
                navigator.share({
                    title: title,
                    text: 'Посмотри этот танец в PRO ТАНЦЫ!',
                    url: window.location.href,
                }).catch(() => {
                    showToast('Не удалось поделиться');
                });
            } else {
                showToast('Скопируйте ссылку: ' + window.location.href);
            }
        };

        // Функции для расписания
        window.selectDate = function(date) {
            selectedDate = date;
            renderPage();
        };

        // Админ панель
        document.getElementById('adminLock')?.addEventListener('click', () => {
            document.getElementById('adminPanel').style.display = 'block';
        });

        window.checkAdminPassword = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') { // Смените пароль на свой!
                isAdmin = true;
                document.getElementById('adminPanel').style.display = 'none';
                
                // Заполняем поля текущими данными
                if (document.getElementById('rulesText')) {
                    document.getElementById('rulesText').value = appData.rules;
                }
                
                document.getElementById('adminMenu').style.display = 'block';
                showToast('Добро пожаловать, администратор!');
            } else {
                showToast('Неверный пароль!');
            }
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        };

        window.logoutAdmin = function() {
            isAdmin = false;
            document.getElementById('adminMenu').style.display = 'none';
            showToast('Вы вышли из админ-панели');
        };

        window.addClip = function() {
            if (!isAdmin) return;
            
            const title = document.getElementById('clipTitle')?.value;
            const desc = document.getElementById('clipDesc')?.value;
            const url = document.getElementById('clipUrl')?.value;
            
            if (title && desc && url) {
                appData.clips.push({
                    id: appData.clips.length + 1,
                    title: title,
                    description: desc,
                    url: url,
                    reactions: { likes: 0, hearts: 0, fire: 0 },
                    comments: []
                });
                
                // Очистка полей
                document.getElementById('clipTitle').value = '';
                document.getElementById('clipDesc').value = '';
                document.getElementById('clipUrl').value = '';
                
                // Обновление страницы
                if (currentPage === 'clips') renderPage();
                
                showToast('Клип добавлен!');
            } else {
                showToast('Заполните все поля');
            }
        };

        window.addTraining = function() {
            if (!isAdmin) return;
            
            const date = document.getElementById('trainingDate')?.value;
            const time = document.getElementById('trainingTime')?.value;
            const name = document.getElementById('trainingName')?.value;
            
            if (date && time && name) {
                if (!appData.trainings[date]) {
                    appData.trainings[date] = [];
                }
                
                appData.trainings[date].push(`${time} - ${name}`);
                
                // Очистка полей
                document.getElementById('trainingDate').value = '';
                document.getElementById('trainingTime').value = '';
                document.getElementById('trainingName').value = '';
                
                // Обновление страницы
                if (currentPage === 'schedule') renderPage();
                
                showToast('Тренировка добавлена!');
            } else {
                showToast('Заполните все поля');
            }
        };

        window.clearTraining = function() {
            if (!isAdmin) return;
            
            const date = document.getElementById('trainingDate')?.value;
            if (date && appData.trainings[date]) {
                delete appData.trainings[date];
                
                document.getElementById('trainingDate').value = '';
                
                if (currentPage === 'schedule') renderPage();
                
                showToast('Тренировки удалены!');
            } else {
                showToast('Выберите дату');
            }
        };

        window.saveRules = function() {
            if (!isAdmin) return;
            
            const rules = document.getElementById('rulesText')?.value;
            if (rules) {
                appData.rules = rules;
                if (currentPage === 'rules') renderPage();
                showToast('Правила сохранены!');
            }
        };

        window.closeModal = function() {
            const modal = document.getElementById('clipModal');
            if (modal) modal.remove();
        };

        // Утилиты
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        // Закрытие модального окна по клику вне его
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });

        // Обработка свайпов для мобильных
        let touchStartX = 0;
        let touchEndX = 0;
        
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, false);
        
        document.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, false);
        
        function handleSwipe() {
            const pages = ['clips', 'schedule', 'rules', 'classes'];
            const currentIndex = pages.indexOf(currentPage);
            
            if (touchEndX < touchStartX - 50 && currentIndex < pages.length - 1) {
                // Свайп влево
                const nextPage = pages[currentIndex + 1];
                document.querySelectorAll('.nav-item').forEach(nav => {
                    if (nav.dataset.page === nextPage) {
                        nav.click();
                    }
                });
            }
            
            if (touchEndX > touchStartX + 50 && currentIndex > 0) {
                // Свайп вправо
                const prevPage = pages[currentIndex - 1];
                document.querySelectorAll('.nav-item').forEach(nav => {
                    if (nav.dataset.page === prevPage) {
                        nav.click();
                    }
                });
            }
        }

        // Начальный рендер
        renderPage();
    </script>
</body>
</html>
