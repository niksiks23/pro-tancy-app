<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PRO ТАНЦЫ | клуб</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #9d4edd;
            --primary-dark: #7b2cbf;
            --secondary: #00bbf9;
            --bg-dark: #0a0a0f;
            --bg-card: rgba(20, 10, 30, 0.7);
            --glass-border: rgba(157, 78, 221, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            --cancel-color: #ff4b4b;
            --admin-badge: #ff006e;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(145deg, #0f0f1a 0%, #1a1025 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            margin: 0 auto;
        }

        .app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 2;
        }

        .app-header {
            padding: 18px 20px 10px;
            text-align: center;
            background: linear-gradient(180deg, rgba(26, 16, 37, 0.95) 0%, rgba(26, 16, 37, 0.8) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            position: relative;
        }

        .app-header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            cursor: pointer;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            transition: all 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .app-header h1:active {
            transform: scale(0.95);
            background: rgba(157, 78, 221, 0.2);
            -webkit-background-clip: text;
        }

        .app-header p {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .admin-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            background: var(--admin-badge);
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .admin-badge.active {
            opacity: 1;
        }

        .nav-bar {
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 12px;
            background: rgba(26, 16, 37, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
            gap: 5px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
            padding: 8px 0;
            border-radius: 20px;
            flex: 1;
            max-width: 80px;
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item svg {
            width: 22px;
            height: 22px;
            transition: all 0.2s ease;
        }

        .nav-item.active svg {
            color: var(--primary);
            filter: drop-shadow(0 0 5px var(--primary));
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .content::-webkit-scrollbar {
            display: none;
        }

        .clips-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .clip-card {
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            transition: transform 0.15s ease;
        }

        .clip-card:active {
            transform: scale(0.97);
        }

        .clip-thumbnail {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(0, 187, 249, 0.2));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clip-thumbnail svg {
            width: 32px;
            height: 32px;
            color: var(--primary);
            opacity: 0.8;
        }

        .clip-info {
            padding: 12px;
        }

        .clip-title {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip-description {
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clip-stats {
            display: flex;
            gap: 12px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 18px;
        }

        .modal-content {
            width: 100%;
            max-width: 360px;
            max-height: 80vh;
            background: #1a1025;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            overflow-y: auto;
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .video-placeholder svg {
            width: 48px;
            height: 48px;
            color: white;
        }

        .reactions-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 18px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 40px;
        }

        .reaction-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .reaction-btn:active {
            transform: scale(0.9);
        }

        .reaction-icon {
            width: 52px;
            height: 52px;
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .reaction-btn.liked .reaction-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .reaction-btn.disliked .reaction-icon {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .reaction-icon svg {
            width: 26px;
            height: 26px;
            color: white;
        }

        .reaction-count {
            font-size: 16px;
            font-weight: 600;
            color: var(--primary);
        }

        .reaction-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .comments-section {
            max-height: 140px;
            overflow-y: auto;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            margin: 16px 0;
        }

        .comment {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: var(--text-secondary);
        }

        .comment:last-child {
            border-bottom: none;
        }

        .comment-author {
            color: var(--primary);
            font-weight: 600;
            margin-right: 6px;
        }

        .calendar-wrapper {
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 18px;
            border: 1px solid var(--glass-border);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .calendar-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .calendar-nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .calendar-nav-btn:active {
            background: var(--primary);
        }

        .calendar-nav-btn svg {
            width: 20px;
            height: 20px;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 8px;
            text-align: center;
        }

        .weekday {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            position: relative;
        }

        .calendar-day:active {
            background: rgba(157, 78, 221, 0.3);
        }

        .calendar-day.has-training {
            background: rgba(157, 78, 221, 0.2);
            color: var(--primary);
            font-weight: 600;
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .calendar-day.other-month {
            opacity: 0.2;
        }

        .training-count {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--primary);
            color: white;
            font-size: 9px;
            width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .trainings-container {
            margin-top: 14px;
        }

        .trainings-title {
            font-size: 15px;
            margin-bottom: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trainings-title span {
            background: rgba(157, 78, 221, 0.2);
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 12px;
            color: var(--primary);
        }

        .admin-mode-banner {
            background: rgba(255, 75, 75, 0.1);
            border: 1px dashed var(--cancel-color);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--cancel-color);
            font-size: 13px;
            font-weight: 500;
        }

        .admin-mode-banner svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .training-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .training-item.admin-mode {
            cursor: pointer;
            border-left-color: var(--cancel-color);
            background: rgba(255, 75, 75, 0.05);
        }

        .training-item.admin-mode:active {
            background: rgba(255, 75, 75, 0.2);
            transform: scale(0.98);
        }

        .training-item.cancelled {
            opacity: 0.5;
            border-left-color: var(--cancel-color);
            text-decoration: line-through;
        }

        .training-time {
            background: rgba(157, 78, 221, 0.2);
            padding: 5px 10px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
        }

        .training-name {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .training-cancel-btn {
            width: 32px;
            height: 32px;
            border-radius: 16px;
            background: var(--cancel-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255, 75, 75, 0.4);
        }

        .no-trainings {
            padding: 24px;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .rules-container {
            padding: 20px;
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .rules-container h2 {
            font-size: 22px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .rule-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rule-number {
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: white;
        }

        .rule-text {
            flex: 1;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .classes-placeholder {
            text-align: center;
            padding: 40px 20px;
            background: var(--bg-card);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .classes-placeholder svg {
            width: 60px;
            height: 60px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .classes-placeholder h3 {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .classes-placeholder p {
            font-size: 13px;
            color: var(--text-muted);
        }

        .admin-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 300px;
            background: #1a1025;
            border-radius: 28px;
            padding: 28px 24px;
            z-index: 3000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 40px rgba(157, 78, 221, 0.4);
        }

        .admin-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .admin-modal h3 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 22px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .admin-input {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            color: white;
            font-size: 15px;
            text-align: center;
        }

        .admin-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .admin-btn {
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 18px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin: 8px 0;
            width: 100%;
            font-size: 15px;
            transition: all 0.15s ease;
        }

        .admin-btn:active {
            transform: scale(0.97);
        }

        .admin-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .admin-btn.warning {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        .admin-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(3px);
            z-index: 2500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .admin-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .admin-panel {
            position: fixed;
            bottom: -100%;
            left: 0;
            width: 100%;
            max-width: 420px;
            right: 0;
            margin: 0 auto;
            background: #1a1025;
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 28px 20px 30px;
            z-index: 3500;
            transition: bottom 0.3s ease;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.5);
            border-top: 2px solid var(--primary);
            max-height: 85vh;
            overflow-y: auto;
        }

        .admin-panel.active {
            bottom: 0;
        }

        .admin-handle {
            width: 45px;
            height: 5px;
            background: var(--primary);
            border-radius: 3px;
            margin: 0 auto 22px;
        }

        .admin-panel h2 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 18px;
            color: var(--primary);
        }

        .admin-section {
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--glass-border);
        }

        .admin-section h3 {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: 12px;
        }

        .admin-close {
            position: absolute;
            top: 15px;
            right: 18px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            width: 35px;
            height: 35px;
        }

        .admin-tip {
            background: rgba(255, 75, 75, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
            font-size: 13px;
            border: 1px solid rgba(255, 75, 75, 0.3);
        }

        .admin-tip svg {
            width: 24px;
            height: 24px;
            color: var(--cancel-color);
            flex-shrink: 0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 4000;
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
        }

        @supports (padding: max(0px)) {
            .app-header {
                padding-top: max(18px, env(safe-area-inset-top) + 12px);
            }
            .admin-panel {
                padding-bottom: max(30px, env(safe-area-inset-bottom) + 20px);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app" id="mainApp">
            <header class="app-header">
                <h1 id="adminTrigger">PRO ТАНЦЫ</h1>
                <p>DANCE CLUB</p>
                <div class="admin-badge" id="adminBadge">ADMIN</div>
            </header>

            <nav class="nav-bar" id="navigation">
                <div class="nav-item active" data-page="schedule">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <span>Расписание</span>
                </div>
                <div class="nav-item" data-page="clips">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="2" width="20" height="20" rx="4" />
                        <path d="M8 2v20M16 2v20M2 8h20M2 16h20" />
                    </svg>
                    <span>Клипы</span>
                </div>
                <div class="nav-item" data-page="rules">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span>Правила</span>
                </div>
                <div class="nav-item" data-page="classes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" />
                        <line x1="6" y1="1" x2="6" y2="4" />
                        <line x1="10" y1="1" x2="10" y2="4" />
                        <line x1="14" y1="1" x2="14" y2="4" />
                    </svg>
                    <span>Занятия</span>
                </div>
            </nav>

            <div class="content" id="content"></div>
        </div>

        <div class="admin-overlay" id="adminOverlay"></div>

        <div class="admin-modal" id="adminLoginModal">
            <h3>Вход администратора</h3>
            <input type="password" class="admin-input" id="adminPassword" placeholder="Пароль" />
            <button class="admin-btn" onclick="checkAdminPassword()">Войти</button>
            <button class="admin-btn secondary" onclick="closeAdminLogin()">Отмена</button>
        </div>

        <div class="admin-panel" id="adminPanel">
            <button class="admin-close" onclick="closeAdminPanel()">✕</button>
            <div class="admin-handle"></div>
            <h2>Управление</h2>
            
            <div class="admin-section">
                <h3>➕ Добавить клип</h3>
                <input type="text" class="admin-input" id="clipTitle" placeholder="Название" />
                <input type="text" class="admin-input" id="clipDesc" placeholder="Описание" />
                <input type="url" class="admin-input" id="clipUrl" placeholder="URL видео" />
                <button class="admin-btn" onclick="addClip()">Добавить клип</button>
            </div>

            <div class="admin-section">
                <h3>📝 Правила</h3>
                <textarea class="admin-input" id="rulesText" rows="3" placeholder="Текст правил" style="text-align: left;"></textarea>
                <button class="admin-btn" onclick="saveRules()">Сохранить</button>
            </div>

            <div class="admin-tip">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <span>Чтобы отменить тренировку: закройте эту панель и нажмите на любую тренировку в расписании. Они станут красными с кнопкой ✕</span>
            </div>
            
            <button class="admin-btn secondary" onclick="closeAdminPanel()">Закрыть</button>
        </div>
    </div>

    <script>
        const STORAGE_KEYS = {
            CLIPS: 'pro_dance_clips',
            CANCELLED_TRAININGS: 'pro_dance_cancelled',
            RULES: 'pro_dance_rules'
        };

        // Постоянное расписание по дням недели
        const WEEKLY_SCHEDULE = {
            1: [ // Понедельник
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Калланетика' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Латина (новички)' }
            ],
            2: [ // Вторник
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (7-9 лет)' }
            ],
            3: [ // Среда
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Латина (старшая)' },
                { time: '20:00', name: 'Индивидуальные' }
            ],
            4: [ // Четверг
                { time: '18:00', name: 'Бальные танцы (5-6 лет)' },
                { time: '19:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '20:00', name: 'Бачата (новички)' }
            ],
            5: [ // Пятница
                { time: '17:15', name: 'Ритмика (3-5 лет)' },
                { time: '18:00', name: 'Бальные танцы' },
                { time: '19:00', name: 'Индивидуальные' }
            ],
            6: [ // Суббота
                { time: '9:00', name: 'Калланетика' },
                { time: '10:00', name: 'Бачата + Латина' },
                { time: '11:00', name: 'Бальные танцы (9-12 лет)' },
                { time: '12:00', name: 'Индивидуальные' }
            ],
            7: [] // Воскресенье - выходной
        };

        const defaultData = {
            clips: [],
            cancelledTrainings: {},
            rules: '1. Приходить за 15 минут\n2. Сменная обувь\n3. Вода с собой\n4. Предупреждать о пропусках'
        };

        function loadData() {
            try {
                const savedClips = localStorage.getItem(STORAGE_KEYS.CLIPS);
                const savedCancelled = localStorage.getItem(STORAGE_KEYS.CANCELLED_TRAININGS);
                const savedRules = localStorage.getItem(STORAGE_KEYS.RULES);

                return {
                    clips: savedClips ? JSON.parse(savedClips) : defaultData.clips,
                    cancelledTrainings: savedCancelled ? JSON.parse(savedCancelled) : defaultData.cancelledTrainings,
                    rules: savedRules || defaultData.rules
                };
            } catch (e) {
                console.error('Ошибка загрузки данных:', e);
                return defaultData;
            }
        }

        function saveData() {
            try {
                localStorage.setItem(STORAGE_KEYS.CLIPS, JSON.stringify(appData.clips));
                localStorage.setItem(STORAGE_KEYS.CANCELLED_TRAININGS, JSON.stringify(appData.cancelledTrainings));
                localStorage.setItem(STORAGE_KEYS.RULES, appData.rules);
            } catch (e) {
                console.error('Ошибка сохранения данных:', e);
                showToast('Ошибка сохранения данных');
            }
        }

        let appData = loadData();

        let currentPage = 'schedule';
        let selectedDate = new Date().toISOString().split('T')[0];
        let currentMonth = new Date();
        let isAdmin = false;

        document.addEventListener('DOMContentLoaded', () => {
            renderPage();
            initAdminTrigger();
            updateAdminBadge();
        });

        function initAdminTrigger() {
            const trigger = document.getElementById('adminTrigger');
            trigger.addEventListener('click', () => {
                if (!isAdmin) {
                    document.getElementById('adminLoginModal').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                    document.getElementById('adminPassword').value = '';
                    document.getElementById('adminPassword').focus();
                } else {
                    // Если уже админ, показываем панель управления
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }
            });
        }

        function updateAdminBadge() {
            const badge = document.getElementById('adminBadge');
            if (isAdmin) {
                badge.classList.add('active');
            } else {
                badge.classList.remove('active');
            }
        }

        window.closeAdminLogin = function() {
            document.getElementById('adminLoginModal').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.closeAdminPanel = function() {
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminOverlay').classList.remove('active');
        };

        window.checkAdminPassword = function() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin123') {
                isAdmin = true;
                closeAdminLogin();
                updateAdminBadge();
                
                document.getElementById('rulesText').value = appData.rules;
                
                // Обновляем страницу, чтобы показать красные кнопки отмены
                renderPage();
                
                setTimeout(() => {
                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminOverlay').classList.add('active');
                }, 300);
                
                showToast('Режим администратора активирован');
            } else {
                showToast('Неверный пароль');
            }
        };

        window.logoutAdmin = function() {
            isAdmin = false;
            updateAdminBadge();
            closeAdminPanel();
            renderPage();
            showToast('Вы вышли из режима администратора');
        };

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentPage = item.dataset.page;
                renderPage();
            });
        });

        function renderPage() {
            const content = document.getElementById('content');
            if (!content) return;
            
            switch(currentPage) {
                case 'schedule': renderSchedule(content); break;
                case 'clips': renderClips(content); break;
                case 'rules': renderRules(content); break;
                case 'classes': renderClasses(content); break;
            }
        }

        function renderClips(container) {
            if (appData.clips.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px 20px; background: var(--bg-card); border-radius: 20px;">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5">
                            <rect x="2" y="2" width="20" height="20" rx="4" />
                            <path d="M8 2v20M16 2v20M2 8h20M2 16h20" />
                        </svg>
                        <h3 style="margin: 20px 0; color: var(--primary); font-size: 18px;">Нет клипов</h3>
                        <p style="color: var(--text-muted); font-size: 14px;">Клипы появятся позже</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="clips-grid">';
            appData.clips.forEach(clip => {
                html += `
                    <div class="clip-card" onclick="openClip(${clip.id})">
                        <div class="clip-thumbnail">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="12" cy="12" r="10" />
                                <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" />
                            </svg>
                        </div>
                        <div class="clip-info">
                            <div class="clip-title">${clip.title}</div>
                            <div class="clip-description">${clip.description}</div>
                            <div class="clip-stats">
                                <span>👍 ${clip.likes || 0}</span>
                                <span>👎 ${clip.dislikes || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function getTrainingsForDate(dateStr) {
            const date = new Date(dateStr);
            const dayOfWeek = date.getDay() === 0 ? 7 : date.getDay();
            
            const weeklyTrainings = WEEKLY_SCHEDULE[dayOfWeek] || [];
            
            const cancelledForDate = appData.cancelledTrainings[dateStr] || [];
            
            return weeklyTrainings.map(training => {
                const trainingKey = `${training.time} ${training.name}`;
                return {
                    ...training,
                    isCancelled: cancelledForDate.includes(trainingKey)
                };
            });
        }

        function renderSchedule(container) {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            const weekdays = ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ', 'ВС'];
            
            let html = `
                <div class="calendar-wrapper">
                    <div class="calendar-header">
                        <button class="calendar-nav-btn" onclick="changeMonth(-1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="15 18 9 12 15 6" /></svg>
                        </button>
                        <h3>${months[month]} ${year}</h3>
                        <button class="calendar-nav-btn" onclick="changeMonth(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="9 18 15 12 9 6" /></svg>
                        </button>
                    </div>
                    <div class="weekdays">${weekdays.map(d => `<div class="weekday">${d}</div>`).join('')}</div>
                    <div class="calendar-grid">
            `;
            
            for (let i = 0; i < startDay; i++) html += '<div class="calendar-day other-month"></div>';
            
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const trainings = getTrainingsForDate(dateStr);
                const activeTrainings = trainings.filter(t => !t.isCancelled);
                const hasTraining = activeTrainings.length > 0;
                const isSelected = selectedDate === dateStr;
                
                html += `
                    <div class="calendar-day ${hasTraining ? 'has-training' : ''} ${isSelected ? 'selected' : ''}" onclick="selectDate('${dateStr}')">
                        ${i}
                        ${activeTrainings.length > 0 ? `<span class="training-count">${activeTrainings.length}</span>` : ''}
                    </div>
                `;
            }
            
            html += '</div></div>';
            
            // Добавляем баннер для режима администратора
            if (isAdmin) {
                html += `
                    <div class="admin-mode-banner">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <line x1="12" y1="8" x2="12" y2="12" />
                            <line x1="12" y1="16" x2="12.01" y2="16" />
                        </svg>
                        <span>Режим администратора: нажмите на тренировку чтобы отменить или восстановить</span>
                    </div>
                `;
            }
            
            html += '<div class="trainings-container">';
            html += `<div class="trainings-title">📅 Тренировки <span>${formatDate(selectedDate)}</span></div>`;
            
            const trainings = getTrainingsForDate(selectedDate);
            
            if (trainings.length > 0) {
                trainings.forEach(t => {
                    const isCancelled = t.isCancelled;
                    const cancelledClass = isCancelled ? 'cancelled' : '';
                    const adminClass = isAdmin ? 'admin-mode' : '';
                    
                    html += `
                        <div class="training-item ${adminClass} ${cancelledClass}" 
                             onclick="${isAdmin ? `toggleCancelTraining('${selectedDate}', '${t.time}', '${t.name.replace(/'/g, "\\'")}')` : ''}">
                            <span class="training-time">${t.time}</span>
                            <span class="training-name">${t.name}</span>
                            ${isAdmin ? '<span class="training-cancel-btn">✕</span>' : ''}
                        </div>
                    `;
                });
            } else {
                html += '<div class="no-trainings">Нет тренировок</div>';
            }
            html += '</div>';
            
            container.innerHTML = html;
        }

        function renderRules(container) {
            const rulesList = appData.rules.split('\n').map((rule, i) => {
                const text = rule.replace(/^\d+\.\s*/, '');
                return { number: i + 1, text };
            });
            
            let html = '<div class="rules-container"><h2>Правила клуба</h2>';
            rulesList.forEach(rule => {
                html += `<div class="rule-item"><div class="rule-number">${rule.number}</div><div class="rule-text">${rule.text}</div></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function renderClasses(container) {
            container.innerHTML = `
                <div class="classes-placeholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <h3>Скоро появятся</h3>
                    <p>Расписание занятий будет доступно в ближайшее время</p>
                </div>
            `;
        }

        window.openClip = function(clipId) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (!clip) return;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.id = 'clipModal';
            
            const likeClass = clip.userReaction === 'like' ? 'liked' : '';
            const dislikeClass = clip.userReaction === 'dislike' ? 'disliked' : '';
            
            let commentsHtml = '';
            if (clip.comments) {
                clip.comments.forEach(c => {
                    const [author, text] = c.split(': ');
                    commentsHtml += `<div class="comment"><span class="comment-author">${author}</span>${text}</div>`;
                });
            }
            
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="video-placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="white"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="white"/></svg></div>
                    <h3 style="font-size:18px; margin-bottom:6px;">${clip.title}</h3>
                    <p style="font-size:13px; color:rgba(255,255,255,0.6); margin-bottom:12px;">${clip.description}</p>
                    
                    <div class="reactions-container">
                        <div class="reaction-btn ${likeClass}" onclick="handleReaction(${clipId}, 'like')">
                            <div class="reaction-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg></div>
                            <span class="reaction-count">${clip.likes || 0}</span>
                            <span class="reaction-label">Нравится</span>
                        </div>
                        <div class="reaction-btn ${dislikeClass}" onclick="handleReaction(${clipId}, 'dislike')">
                            <div class="reaction-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H7m10 0h3a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3"/></svg></div>
                            <span class="reaction-count">${clip.dislikes || 0}</span>
                            <span class="reaction-label">Не нравится</span>
                        </div>
                    </div>
                    
                    <div class="comments-section">${commentsHtml || '<div style="text-align:center; color:rgba(255,255,255,0.2);">Нет комментариев</div>'}</div>
                    
                    <div style="display:flex; gap:8px; margin:14px 0;">
                        <input type="text" class="admin-input" id="newComment" placeholder="Комментарий..." style="flex:1; padding:12px; text-align:left;">
                        <button class="admin-btn" onclick="addComment(${clipId})" style="width:auto; padding:12px 18px;">➤</button>
                    </div>
                    
                    <button class="admin-btn secondary" onclick="closeModal()">Закрыть</button>
                </div>
            `;
            
            document.body.appendChild(modal);
        };

        window.handleReaction = function(clipId, type) {
            const clip = appData.clips.find(c => c.id === clipId);
            if (!clip) return;
            
            if (clip.userReaction === type) {
                clip[type === 'like' ? 'likes' : 'dislikes'] = (clip[type === 'like' ? 'likes' : 'dislikes'] || 0) - 1;
                clip.userReaction = null;
            } else {
                if (clip.userReaction) {
                    clip[clip.userReaction === 'like' ? 'likes' : 'dislikes'] = (clip[clip.userReaction === 'like' ? 'likes' : 'dislikes'] || 0) - 1;
                }
                clip[type === 'like' ? 'likes' : 'dislikes'] = (clip[type === 'like' ? 'likes' : 'dislikes'] || 0) + 1;
                clip.userReaction = type;
            }
            
            saveData();
            closeModal();
            openClip(clipId);
        };

        window.addComment = function(clipId) {
            const comment = document.getElementById('newComment')?.value;
            if (comment?.trim()) {
                const clip = appData.clips.find(c => c.id === clipId);
                if (clip) {
                    if (!clip.comments) clip.comments = [];
                    clip.comments.push('Вы: ' + comment.trim());
                    saveData();
                }
                closeModal();
                openClip(clipId);
            }
        };

        window.closeModal = function() {
            document.getElementById('clipModal')?.remove();
        };

        window.changeMonth = function(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderPage();
        };

        window.selectDate = function(date) {
            selectedDate = date;
            renderPage();
        };

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}`;
        }

        window.toggleCancelTraining = function(date, time, name) {
            if (!isAdmin) return;
            
            const trainingKey = `${time} ${name}`;
            
            if (!appData.cancelledTrainings[date]) {
                appData.cancelledTrainings[date] = [];
            }
            
            const index = appData.cancelledTrainings[date].indexOf(trainingKey);
            
            if (index === -1) {
                appData.cancelledTrainings[date].push(trainingKey);
                showToast('❌ Тренировка отменена');
            } else {
                appData.cancelledTrainings[date].splice(index, 1);
                showToast('✅ Тренировка восстановлена');
            }
            
            if (appData.cancelledTrainings[date].length === 0) {
                delete appData.cancelledTrainings[date];
            }
            
            saveData();
            renderPage();
        };

        window.addClip = function() {
            if (!isAdmin) return;
            const title = document.getElementById('clipTitle')?.value;
            const desc = document.getElementById('clipDesc')?.value;
            const url = document.getElementById('clipUrl')?.value;
            
            if (title && desc && url) {
                appData.clips.push({
                    id: appData.clips.length + 1,
                    title, 
                    description: desc, 
                    url,
                    likes: 0, 
                    dislikes: 0, 
                    userReaction: null, 
                    comments: []
                });
                
                ['clipTitle', 'clipDesc', 'clipUrl'].forEach(id => document.getElementById(id).value = '');
                saveData();
                if (currentPage === 'clips') renderPage();
                showToast('Клип добавлен');
            }
        };

        window.saveRules = function() {
            if (!isAdmin) return;
            const rules = document.getElementById('rulesText')?.value;
            if (rules) {
                appData.rules = rules;
                saveData();
                if (currentPage === 'rules') renderPage();
                showToast('Правила сохранены');
            }
        };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
